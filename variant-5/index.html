<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EWA — Light Violet (Variant 5)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface-2: #f0f5f0;
  --glass: rgba(74,156,63,0.04);
  --glass-border: rgba(74,156,63,0.12);
  --accent: #4a9c3f;
  --accent-2: #22c55e;
  --accent-glow: rgba(74,156,63,0.3);
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #d4ead1;
  --brand-green: #4a9c3f;
  --success: #22c55e;
  --font: 'Montserrat', system-ui, sans-serif;
  --radius: 16px;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

#root { min-height: 100vh; }

/* ── Ambient blobs ── */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  will-change: transform;
}
.blob-1 {
  width: 420px; height: 420px;
  background: rgba(74,156,63,0.08);
  top: -100px; left: -100px;
  animation: blob1 18s ease-in-out infinite;
}
.blob-2 {
  width: 360px; height: 360px;
  background: rgba(34,197,94,0.06);
  bottom: -80px; right: -80px;
  animation: blob2 22s ease-in-out infinite;
}
@keyframes blob1 {
  0%,100% { transform: translate(0,0) scale(1); }
  33%     { transform: translate(40px,-30px) scale(1.08); }
  66%     { transform: translate(-20px,20px) scale(0.95); }
}
@keyframes blob2 {
  0%,100% { transform: translate(0,0) scale(1); }
  50%     { transform: translate(-30px,-20px) scale(1.1); }
}

/* ── Page overlay (dark ripple) ── */
.page-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  pointer-events: none;
  background: radial-gradient(circle at center, #4a9c3f 0%, #ffffff 70%);
  clip-path: circle(0% at 50% 72%);
  transition: clip-path 0.42s cubic-bezier(0.76,0,0.24,1);
}
.page-overlay.expand {
  clip-path: circle(170% at 50% 72%);
}
.page-overlay.retract {
  clip-path: circle(0% at 50% 4%);
  transition: clip-path 0.36s cubic-bezier(0.76,0,0.24,1);
}

/* ── Screen fade/scale ── */
.screen-wrap {
  animation: screenIn 0.35s cubic-bezier(0.33,1,0.68,1) both;
}
@keyframes screenIn {
  from { opacity: 0; transform: scale(0.97) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── Layout ── */
.app-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  align-items: stretch;
  background: var(--bg);
  position: relative;
  z-index: 1;
}
.flow-wrap {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  align-self: center;
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 0;
}

/* ── Site header ── */
.site-header {
  width: 100%;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 20px;
  position: relative;
  z-index: 10;
}
.site-header img {
  height: 36px;
  filter: none;
}

/* ── Progress bar ── */
.progress-bar-track {
  width: 100%;
  height: 6px;
  background: var(--border);
  position: relative;
  z-index: 10;
}
.progress-bar-fill {
  height: 100%;
  background: var(--brand-green);
  transition: width 0.5s ease;
}

/* ── Glass card ── */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius);
}

/* ── SCREEN 1 ── */
.s1-content {
  padding: 32px 20px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.s1-headline {
  font-size: 28px;
  font-weight: 300;
  color: var(--text);
  text-align: center;
  line-height: 1.3;
  margin-bottom: 20px;
}
@media (min-width: 400px) { .s1-headline { font-size: 32px; } }

.tip-block {
  padding: 14px 16px;
  margin-bottom: 24px;
  font-size: 12px;
  font-style: italic;
  color: var(--text-muted);
  line-height: 1.5;
}
.tip-label {
  display: block;
  margin-top: 8px;
  font-style: normal;
  font-weight: 600;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.05em;
  cursor: pointer;
}

.account-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 0;
}
.account-card-wrap:last-child {
  grid-column: 1 / -1;
}

.account-card {
  min-height: 90px;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
  text-align: center;
  border: 1px solid var(--glass-border);
  background: var(--glass);
  border-radius: var(--radius);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.account-card:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.account-card:hover {
  background: var(--surface-2);
}
.account-card.selected {
  border-color: var(--accent);
  background: rgba(74,156,63,0.15);
  box-shadow: 0 0 20px var(--accent-glow);
}
.account-card .mat-icon {
  font-size: 28px;
  color: var(--accent);
  font-family: 'Material Icons Outlined';
  font-style: normal;
  line-height: 1;
}
.account-card span.label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.btn-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 75px;
}
.btn-back {
  background: transparent;
  border: 1px solid var(--glass-border);
  border-radius: 99px;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  flex-shrink: 0;
  transition: border-color 0.2s, color 0.2s;
}
.btn-back:hover { border-color: var(--accent); color: var(--accent); }
.btn-back .mat-icon {
  font-family: 'Material Icons Outlined';
  font-style: normal;
  font-size: 22px;
}
.btn-continue {
  flex: 1;
  min-height: 52px;
  border: none;
  border-radius: 99px;
  font-size: 16px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  color: #fff;
  letter-spacing: 0.02em;
}
.btn-continue:active { transform: scale(0.97); }
.btn-continue.green {
  background: var(--brand-green);
}
.btn-continue.gradient {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
}

.s1-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.s1-footer .mat-icon {
  font-family: 'Material Icons Outlined';
  font-style: normal;
  font-size: 14px;
}

/* ── SCREEN 2 — Conversational form ── */
.s2-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 40px 20px 32px;
  position: relative;
  overflow: hidden;
}

.s2-trust {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 48px;
}
.s2-trust .mat-icon {
  font-family: 'Material Icons Outlined';
  font-style: normal;
  font-size: 14px;
  color: var(--success);
}

.convo-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  min-height: 0;
}

.convo-question {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 24px;
  line-height: 1.3;
  animation: slideUp 0.35s cubic-bezier(0.33,1,0.68,1) both;
}
@media (min-width: 400px) { .convo-question { font-size: 26px; } }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-24px); }
}
.convo-question.exiting {
  animation: slideOut 0.25s ease both;
}

.convo-input {
  width: 100%;
  background: #ffffff;
  border: 2px solid var(--glass-border);
  border-radius: 12px;
  padding: 18px 20px;
  font-size: 20px;
  font-weight: 600;
  color: #1a1a2e;
  font-family: var(--font);
  transition: border-color 0.2s, box-shadow 0.2s;
  appearance: none;
  -webkit-appearance: none;
  caret-color: var(--accent);
}
.convo-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
  outline: none;
}
.convo-input option { background: #ffffff; color: #1a1a2e; }
select.convo-input { cursor: pointer; }

.convo-next-btn {
  width: 100%;
  min-height: 56px;
  margin-top: 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border: none;
  border-radius: 99px;
  font-size: 17px;
  font-weight: 700;
  font-family: var(--font);
  color: #fff;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  letter-spacing: 0.02em;
}
.convo-next-btn:active { transform: scale(0.97); }
.convo-next-btn:disabled { opacity: 0.4; cursor: default; }

.confirm-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(74,156,63,0.06);
  border: 2px solid rgba(74,156,63,0.22);
  border-radius: 12px;
  padding: 18px 20px;
}
.confirm-card-inner { flex: 1; min-width: 0; }
.confirm-card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--accent); margin-bottom: 4px; }
.confirm-card-value { font-size: 20px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.confirm-card-check { font-family: 'Material Icons Outlined'; font-size: 26px; color: var(--accent); flex-shrink: 0; }
.change-link {
  display: inline-block;
  margin-top: 14px;
  background: none;
  border: none;
  padding: 0;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.change-link-muted { color: var(--text-muted); }
.change-link:hover { opacity: .75; }

.progress-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 40px;
}
.progress-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s, transform 0.3s;
}
.progress-dot.active {
  background: var(--accent);
  transform: scale(1.3);
}
.progress-dot.done {
  background: rgba(74,156,63,0.5);
}

/* ── SCREEN 3 — Processing ── */
.s3-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  min-height: 400px;
  padding: 40px 20px;
}

.s3-overlay {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  text-align: center;
}

.s3-spinner {
  position: relative;
  width: 80px;
  height: 80px;
  flex-shrink: 0;
}
.s3-ring {
  position: absolute;
  border-radius: 50%;
  border: 3px solid transparent;
}
.s3-ring-1 {
  inset: 0;
  border-top-color: var(--accent);
  animation: spin 1.1s linear infinite;
}
.s3-ring-2 {
  inset: 14px;
  border-right-color: var(--accent-2);
  animation: spin 1.7s linear infinite reverse;
  opacity: 0.75;
}
.s3-ring-3 {
  inset: 28px;
  border-bottom-color: var(--accent);
  animation: spin 0.85s linear infinite;
  opacity: 0.5;
}
@keyframes spin { to { transform: rotate(360deg); } }

.s3-status {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  min-height: 32px;
  letter-spacing: -0.01em;
}
.s3-status.pop {
  animation: statusPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes statusPop {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}

.s3-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 99px;
  padding: 10px 22px;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.02em;
  animation: badgePop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
@keyframes badgePop {
  from { opacity: 0; transform: scale(0.7); }
  to   { opacity: 1; transform: scale(1); }
}

.s3-substatus {
  font-size: 13px;
  color: var(--text-muted);
  animation: fadeIn 0.4s ease both;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ── SCREEN 4 — Card stack ── */
.s4-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 24px 20px 32px;
}

.s4-header {
  text-align: center;
  margin-bottom: 32px;
}
.s4-header h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
}
.s4-header p {
  font-size: 14px;
  color: var(--text-muted);
}

.card-stack-area {
  position: relative;
  height: 440px;
  margin-bottom: 24px;
}

.offer-card {
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--glass-border);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s, left 0.4s cubic-bezier(0.4,0,0.2,1);
}
.offer-card[data-pos="0"] { transform: translate(0,0) scale(1); z-index: 3; opacity: 1; }
.offer-card[data-pos="1"] { transform: translate(0,14px) scale(0.95); z-index: 2; opacity: 0.7; }
.offer-card[data-pos="2"] { transform: translate(0,26px) scale(0.90); z-index: 1; opacity: 0.45; }
.offer-card.exit-left {
  transform: translate(-105%, 0) rotate(-10deg) !important;
  opacity: 0 !important;
  z-index: 10 !important;
}
.offer-card.exit-right {
  transform: translate(105%, 0) rotate(10deg) !important;
  opacity: 0 !important;
  z-index: 10 !important;
}

.offer-card-header {
  padding: 20px 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
}
.offer-ribbon {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 99px;
  padding: 4px 10px;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.08em;
  backdrop-filter: blur(10px);
}
.offer-logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.offer-logo { height: 28px; object-fit: contain; }
.offer-tagline {
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  font-weight: 500;
  margin-top: 4px;
}
.offer-amt-big {
  font-size: 48px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-top: 4px;
}
.offer-delivery {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  display: flex;
  align-items: center;
  gap: 4px;
}
.offer-delivery .mat-icon {
  font-family: 'Material Icons Outlined';
  font-style: normal;
  font-size: 14px;
}

.offer-card-body {
  background: #f2f2f2;
  backdrop-filter: blur(16px);
  padding: 16px 20px 20px;
}

.offer-section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.amt-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.amt-btn {
  background: #f0f5f0;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 99px;
  padding: 10px 16px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
}
.amt-btn:hover { background: var(--surface-2); }
.amt-btn.selected {
  border-color: transparent;
  color: #fff;
}

.offer-trust {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.offer-trust .mat-icon {
  font-family: 'Material Icons Outlined';
  font-style: normal;
  font-size: 14px;
  color: var(--success);
}

.offer-cta-btn {
  width: 100%;
  min-height: 52px;
  border: none;
  border-radius: 99px;
  font-size: 16px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  letter-spacing: 0.02em;
}
.offer-cta-btn:active { transform: scale(0.97); }

/* ── Card nav ── */
.card-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.card-nav-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.2s;
  flex-shrink: 0;
}
.card-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.card-nav-btn:disabled { opacity: 0.3; cursor: default; }
.card-nav-btn .mat-icon {
  font-family: 'Material Icons Outlined';
  font-style: normal;
  font-size: 22px;
}
.card-nav-dots {
  display: flex;
  gap: 8px;
  align-items: center;
}
.card-nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.25s;
}
.card-nav-dot.active {
  width: 24px;
  border-radius: 99px;
  background: var(--accent);
}

.s4-trust-footer {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: auto;
}
.s4-trust-footer .mat-icon {
  font-family: 'Material Icons Outlined';
  font-style: normal;
  font-size: 14px;
  color: var(--success);
}

/* ── Haptic scale feedback ── */
@keyframes haptic {
  0%   { transform: scale(1); }
  40%  { transform: scale(0.965); }
  100% { transform: scale(1); }
}
.haptic { animation: haptic 0.22s ease both; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Data ── */
const ewaOffers = [
  {
    id: "dave",
    name: "Dave",
    logo: "../media/dave.png",
    logoFilter: "none",
    bclr: "#1a7a32",
    bclr2: "#22a347",
    btext: "#fff",
    cclr: "#1a7a32",
    ctext: "#fff",
    badge: "YOUR BEST OPTION",
    tagline: "You're pre-qualified for",
    maxAmt: 500,
    amounts: [100, 200, 300, 400, 500],
    delivery: "Instant Transfer",

/* ── Screen 1 ── */
function Screen1({ onNext }) {
  const [selected, setSelected] = useState(null);

  const accounts = [
    { id: 'checking', icon: 'account_balance', label: 'Checking Account' },
    { id: 'savings',  icon: 'savings',          label: 'Savings Account' },
    { id: 'none',     icon: 'money_off',         label: 'No Bank Account', fullWidth: true },
  ];

  const handleSelect = (id) => {
    setSelected(id);
    if (id === 'none') {
      setTimeout(() => onNext(), 160);
    }
  };

  const handleContinue = () => {
    if (selected) onNext();
  };

  const handleKeyDown = (e, id) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleSelect(id); }
  };

  return (
    <div className="s1-content screen-wrap">
      <h1 className="s1-headline">What type of bank account do you have?</h1>

      <div className="tip-block glass-card">
        <em>Don't worry if you don't have a traditional bank account — we specialize in finding options for everyone, including those without a checking account.</em>
        <span className="tip-label">A HELPFUL TIP! ∧</span>
      </div>

      <div className="account-grid">
        {accounts.map(a => (
          <div key={a.id} className={`account-card-wrap${a.fullWidth ? ' full-width' : ''}`}
               style={a.fullWidth ? { gridColumn: '1 / -1' } : {}}>
            <div
              className={`account-card${selected === a.id ? ' selected' : ''}`}
              tabIndex={0}
              role="radio"
              aria-checked={selected === a.id}
              aria-label={a.label}
              onClick={() => handleSelect(a.id)}
              onKeyDown={(e) => handleKeyDown(e, a.id)}
            >
              <span className="mat-icon">{a.icon}</span>
              <span className="label">{a.label}</span>
            </div>
          </div>
        ))}
      </div>

      <div className="btn-row">
        <button className="btn-back" aria-label="Go back">
          <span className="mat-icon">arrow_back</span>
        </button>
        <button
          className="btn-continue green"
          onClick={handleContinue}
          disabled={!selected}
          style={{ opacity: selected ? 1 : 0.45, cursor: selected ? 'pointer' : 'default' }}
        >
          Continue
        </button>
      </div>

      <div className="s1-footer">
        <span className="mat-icon">lock</span>
        256-bit SSL Encryption · Your data is protected
      </div>
    </div>
  );
}

/* ── Screen 2 ── */
function Screen2({ userData, onComplete }) {
  const [step, setStep]         = useState(0);
  const [answers, setAnswers]   = useState({});
  const [inputVal, setInputVal] = useState('');
  const [exiting, setExiting]   = useState(false);
  const [editing, setEditing]   = useState(false);
  const [editVal, setEditVal]   = useState('');
  const inputRef = useRef(null);
  const editRef  = useRef(null);

  const q = CONVO_QUESTIONS[step];
  const isConfirm = q.type === 'confirm';

  useEffect(() => {
    setEditing(false);
    setEditVal('');
    if (!isConfirm) setTimeout(() => inputRef.current && inputRef.current.focus(), 50);
  }, [step]);

  useEffect(() => {
    if (editing) setTimeout(() => editRef.current && editRef.current.focus(), 50);
  }, [editing]);

  const canAdvance = () => {
    if (isConfirm) return editing ? editVal.trim().length > 0 : true;
    return inputVal.trim().length > 0;
  };

  const advance = () => {
    if (!canAdvance()) return;
    const val = isConfirm ? (editing ? editVal.trim() : q.confirmVal) : inputVal;
    const newAnswers = { ...answers, [q.key]: val };
    setAnswers(newAnswers);
    setExiting(true);
    setEditing(false);
    setEditVal('');
    setTimeout(() => {
      setExiting(false);
      setInputVal('');
      if (step < CONVO_QUESTIONS.length - 1) setStep(s => s + 1);
      else onComplete(newAnswers);
    }, 250);
  };

  const handleKey = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); advance(); }
  };

  const isValid = canAdvance();
  const btnLabel = isConfirm
    ? (editing ? 'Confirm →' : 'Looks Good ✓')
    : (step < CONVO_QUESTIONS.length - 1 ? 'Next →' : 'Find My Options →');

  return (
    <div className="s2-wrap screen-wrap">
      <div className="s2-trust">
        <span className="mat-icon">lock</span>
        Your info is encrypted and never shared
      </div>

      <div className="convo-area">
        <div className={`convo-question${exiting ? ' exiting' : ''}`} key={step}>
          {q.label({ ...userData, ...answers })}
        </div>

        {isConfirm && !editing && (
          <>
            <div className="confirm-card">
              <div className="confirm-card-inner">
                <div className="confirm-card-label">{q.confirmLabel}</div>
                <div className="confirm-card-value">{q.confirmVal}</div>
              </div>
              <span className="mat-icon confirm-card-check" aria-hidden="true">check_circle</span>
            </div>
            <button className="change-link" onClick={() => setEditing(true)}>
              That's not right — let me update it
            </button>
          </>
        )}

        {isConfirm && editing && (
          <>
            <input
              ref={editRef}
              className="convo-input"
              type={q.key === 'email' ? 'email' : 'text'}
              placeholder={q.confirmVal}
              aria-label={q.key === 'email' ? 'Email address' : 'Full name'}
              value={editVal}
              onChange={e => setEditVal(e.target.value)}
              onKeyDown={handleKey}
              style={{ fontSize: '16px' }}
              autoComplete={q.key === 'email' ? 'email' : 'name'}
            />
            <button className="change-link change-link-muted" onClick={() => { setEditing(false); setEditVal(''); }}>
              ← Use original {q.key === 'email' ? 'email' : 'name'}
            </button>
          </>
        )}

        {!isConfirm && q.type === 'select' && (
          <select
            ref={inputRef}
            className="convo-input"
            value={inputVal}
            onChange={e => setInputVal(e.target.value)}
            style={{ fontSize: '16px' }}
          >
            <option value="">Select your state…</option>
            {US_STATES.map(s => (
              <option key={s} value={s}>{s}</option>
            ))}
          </select>
        )}

        {!isConfirm && q.type !== 'select' && (
          <input
            ref={inputRef}
            className="convo-input"
            type={q.type}
            inputMode={q.inputMode || undefined}
            pattern={q.pattern || undefined}
            placeholder={q.placeholder}
            value={inputVal}
            onChange={e => setInputVal(e.target.value)}
            onKeyDown={handleKey}
            style={{ fontSize: '16px' }}
            autoComplete={q.key === 'email' ? 'email' : 'off'}
          />
        )}

        <button
          className="convo-next-btn"
          onClick={advance}
          disabled={!isValid}
        >
          {btnLabel}
        </button>
      </div>

      <div className="progress-dots">
        {CONVO_QUESTIONS.map((_, i) => (
          <div
            key={i}
            className={`progress-dot${i === step ? ' active' : i < step ? ' done' : ''}`}
          />
        ))}
      </div>
    </div>
  );
}

/* ── Screen 3 ── */
function Screen3({ onComplete }) {
  const messages = [
    "Analyzing your profile…",
    "Mapping EWA networks…",
    "Finding connections…",
    "Match complete! 🎉",
  ];
  const [msgIdx, setMsgIdx]   = useState(0);

  const [isPop, setIsPop]     = useState(false);

  useEffect(() => {
    const timers = [];
    timers.push(setTimeout(() => { setMsgIdx(1); }, 900));
    timers.push(setTimeout(() => { setMsgIdx(2); }, 1900));

    timers.push(setTimeout(() => { setShowBadge(true); }, 3100));
    timers.push(setTimeout(() => { onComplete(); }, 4000));
    return () => timers.forEach(clearTimeout);

  return (
    <div className="s3-wrap screen-wrap">
      <div className="s3-overlay">
        <div className="s3-spinner" role="status" aria-label="Finding your matches">

          <div className="s3-ring s3-ring-2" />
          <div className="s3-ring s3-ring-3" />
        </div>
        <div key={msgIdx} className={`s3-status${isPop && msgIdx === 3 ? ' pop' : ''}`}>
          {messages[msgIdx]}
        </div>
        {showBadge && (
          <div className="s3-badge">
            ⚡ 3 Offers Matched
          </div>
        )}
        {showBadge && (
          <div className="s3-substatus">
            Showing your best options now…
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Screen 4 ── */
function Screen4() {
  const [order, setOrder]         = useState([0, 1, 2]);
  const [selectedAmt, setSelAmt]  = useState({});
  const [exiting, setExiting]     = useState(-1);
  const [exitDir, setExitDir]     = useState('left');
  const [haptic, setHaptic]       = useState(false);
  const [activeIdx, setActiveIdx] = useState(0); /* 0-2 tracks which original offer is front */

  const navigate = (dir) => {
    if (haptic) return;
    setHaptic(true);
    setTimeout(() => setHaptic(false), 250);

    const frontOrigIdx = order[0];
    setExiting(frontOrigIdx);
    setExitDir(dir === 1 ? 'left' : 'right');

    setTimeout(() => {
      setExiting(-1);
      setOrder(prev => {
        if (dir === 1) {
          const [first, ...rest] = prev;
          return [...rest, first];
        } else {
          const last = prev[prev.length - 1];
          return [last, ...prev.slice(0, -1)];
        }
      });
      setActiveIdx(prev => (prev + dir + ewaOffers.length) % ewaOffers.length);
    }, 400);
  };

  const handleSelectAmt = (offerId, amt) => {
    setSelAmt(prev => ({ ...prev, [offerId]: amt }));
  };

  return (
    <div className="s4-wrap screen-wrap">
      <div className="s4-header">
        <h2>Your Matched Offers</h2>
        <p>Personalized results · No credit check</p>
      </div>

      <div className={`card-stack-area${haptic ? ' haptic' : ''}`}>
        {order.map((origIdx, stackPos) => {
          const offer = ewaOffers[origIdx];
          return (
            <OfferCard
              key={offer.id}
              offer={offer}
              pos={stackPos}
              isExiting={exiting === origIdx}
              exitDir={exitDir}
              selectedAmt={selectedAmt}
              onSelectAmt={handleSelectAmt}
            />
          );
        })}
      </div>

      <div className="card-nav">
        <button
          className="card-nav-btn"
          onClick={() => navigate(-1)}
          aria-label="Previous offer"
        >
          <span className="mat-icon">chevron_left</span>
        </button>
        <div className="card-nav-dots">
          {ewaOffers.map((_, i) => (
            <div
              key={i}
              className={`card-nav-dot${i === activeIdx ? ' active' : ''}`}
            />
          ))}
        </div>
        <button
          className="card-nav-btn"
          onClick={() => navigate(1)}
          aria-label="Next offer"
        >
          <span className="mat-icon">chevron_right</span>
        </button>
      </div>

      <div className="s4-trust-footer">
        <span className="mat-icon">lock</span>
        Secured with 256-bit SSL · Never sold · All 3 offers verified
      </div>
    </div>
  );
}

/* ── App shell ── */
function App() {
  const [screen, setScreen]           = useState(1);
  const [overlayState, setOverlay]    = useState('idle'); /* idle | expand | retract */
  const [userData]                    = useState({ firstName: 'Jason' });
  const [formData, setFormData]       = useState({});

  /* Dark ripple transition (Screen 1 → 2) */
  const rippleTransition = useCallback((cb) => {
    setOverlay('expand');
    setTimeout(() => {
      cb();
      setOverlay('retract');
      setTimeout(() => setOverlay('idle'), 480);
    }, 420);
  }, []);

  /* Fade/scale transition (all other) */
  const fadeTransition = useCallback((cb) => {
    cb();
  }, []);

  const handleS1Next  = () => rippleTransition(() => setScreen(2));
  const handleS2Done  = (answers) => {
    setFormData(answers);
    fadeTransition(() => setScreen(3));
  };
  const handleS3Done  = () => fadeTransition(() => setScreen(4));

  const overlayClass =
    overlayState === 'expand'  ? 'page-overlay expand'  :
    overlayState === 'retract' ? 'page-overlay retract' :
    'page-overlay';

  const progressPct = screen === 1 ? 75 : screen === 2 ? 88 : 100;

  return (
    <>
      {/* Ambient blobs */}
      <div className="blob blob-1" aria-hidden="true" />
      <div className="blob blob-2" aria-hidden="true" />

      {/* Page overlay */}
      <div className={overlayClass} aria-hidden="true" />

      <div className="app-shell">
        {/* Site header */}
        <header className="site-header">
          <img src="../media/logo.svg" alt="Logo" />
        </header>

        {/* Progress bar */}
        <div className="progress-bar-track" role="progressbar" aria-valuenow={progressPct} aria-valuemin={0} aria-valuemax={100}>
          <div className="progress-bar-fill" style={{ width: `${progressPct}%` }} />
        </div>

        {/* Screen content */}
        <div className="flow-wrap">
          {screen === 1 && <Screen1 onNext={handleS1Next} />}
          {screen === 2 && <Screen2 userData={userData} onComplete={handleS2Done} />}
          {screen === 3 && <Screen3 onComplete={handleS3Done} />}
          {screen === 4 && <Screen4 />}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
