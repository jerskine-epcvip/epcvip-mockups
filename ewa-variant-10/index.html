<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Early Wage Access — Get Paid Now | Variant 10</title>
  <meta name="description" content="Access wages you've already earned before payday. No credit check. No interest. Same-day deposit." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #061253;
      --navy-mid:   #0b1c72;
      --navy-field: #091060;
      --red:        #f44336;
      --red-dk:     #c62828;
      --red-tint:   rgba(244,67,54,0.08);
      --red-border: rgba(244,67,54,0.25);
      --white:      #ffffff;
      --muted:      #94a3b8;
      --border:     rgba(255,255,255,0.08);
      --font:       'Montserrat', sans-serif;
    }

    html, body {
      height: 100%;
      background: #061253;
      font-family: var(--font);
      color: var(--white);
    }

    #root { height: 100%; }

    /* ── Background Layer ─────────────────────────────────── */
    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(244,67,54,0.08) 1px, transparent 1px);
      background-size: 42px 42px;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
    }
    .bg-orb-1 {
      width: 700px;
      height: 700px;
      top: -180px;
      right: -120px;
      background: radial-gradient(circle, rgba(244,67,54,0.14) 0%, transparent 65%);
    }
    .bg-orb-2 {
      width: 500px;
      height: 500px;
      bottom: -140px;
      left: -100px;
      background: radial-gradient(circle, rgba(244,67,54,0.07) 0%, transparent 65%);
    }

    /* ── App Shell ────────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: 100vh;
    }

    /* ── Left Panel ───────────────────────────────────────── */
    .left-panel {
      background: #061253;
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      padding: 60px 48px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      top: -60%;
      right: -30px;
      width: 3px;
      height: 220%;
      background: rgba(244,67,54,0.15);
      transform: rotate(-35deg);
      transform-origin: center center;
      pointer-events: none;
    }

    .left-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }

    .desktop-logo {
      margin-bottom: 10px;
    }
    .desktop-logo img {
      max-width: 150px;
      height: auto;
      display: block;
    }

    .mobile-brand-row {
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .mobile-logo-headline {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mobile-logo-headline img {
      max-width: 120px;
      height: auto;
      flex-shrink: 0;
    }
    .mobile-logo-headline .headline {
      margin-bottom: 0;
    }

    .desktop-text { display: block; }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--red);
    }

    .headline {
      font-size: clamp(34px, 4vw, 54px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -1px;
      color: var(--white);
    }
    .headline .red { color: var(--red); }

    /* Stat row */
    .stat-row {
      display: flex;
      gap: 0;
    }
    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-item + .stat-item {
      border-left: 1px solid rgba(255,255,255,0.1);
      padding-left: 20px;
    }
    .stat-item:first-child { padding-right: 20px; }
    .stat-number {
      font-size: 18px;
      font-weight: 900;
      color: var(--red);
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Bullets */
    .bullet-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bullet-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bullet-item .material-icons-outlined {
      font-size: 18px;
      color: var(--red);
      flex-shrink: 0;
    }
    .bullet-item span.btxt {
      font-size: 13px;
      font-weight: 500;
      color: var(--white);
    }

    /* SSL Badge */
    .ssl-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }
    .ssl-badge .material-icons-outlined {
      font-size: 15px;
      color: var(--muted);
    }
    .ssl-badge span {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Right Panel ──────────────────────────────────────── */
    .right-panel {
      flex: 1;
      background: #0b1c72;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
    }
    .right-inner {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 60px 40px;
    }

    /* ── Step Bar ─────────────────────────────────────────── */
    .step-bar {
      display: flex;
      align-items: center;
      margin-bottom: 32px;
    }
    .step-bar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .step-bar-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(244,67,54,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      transition: all 0.3s;
      font-family: var(--font);
    }
    .step-bar-circle.done {
      background: rgba(244,67,54,0.15);
      border-color: var(--red);
      color: var(--red);
    }
    .step-bar-circle.active {
      background: var(--red);
      border-color: var(--red);
      color: var(--white);
    }
    .step-bar-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .step-bar-label.active { color: var(--red); }
    .step-bar-line {
      flex: 1;
      height: 2px;
      background: rgba(244,67,54,0.15);
      min-width: 12px;
      margin-bottom: 14px;
      transition: background 0.3s;
    }
    .step-bar-line.done { background: rgba(244,67,54,0.45); }

    /* ── Step Pane Animation ──────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .step-pane {
      animation: fadeUp 0.3s ease both;
    }

    /* ── Step 1 — Amount ──────────────────────────────────── */
    .step-headline {
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .amount-list {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .amount-row {
      display: flex;
      align-items: center;
      padding: 16px 18px;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.03);
      margin-bottom: 10px;
    }
    .amount-row:hover {
      border-color: rgba(244,67,54,0.4);
      background: rgba(244,67,54,0.04);
    }
    .amount-row.selected {
      border-color: var(--red);
      background: rgba(244,67,54,0.08);
    }
    .amount-radio { display: none; }
    .amount-row-label {
      font-weight: 700;
      font-size: 16px;
      color: var(--white);
    }
    .amount-row-range {
      font-size: 13px;
      font-weight: 700;
      color: var(--red);
      margin-top: 2px;
    }
    .amount-row-desc {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-primary:hover:not(:disabled) { background: var(--red-dk); }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--red);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      margin-bottom: 16px;
      opacity: 0.75;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-btn:hover { opacity: 1; }

    /* ── Note / Disclaimer ────────────────────────────────── */
    .step-note {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }

    /* ── EWA Blurb ────────────────────────────────────────── */
    .ewa-blurb {
      border-top: 1px solid rgba(244,67,54,0.2);
      padding-top: 20px;
      margin-top: 24px;
    }
    .ewa-blurb-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .ewa-blurb-body {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Floating Label Fields ────────────────────────────── */
    .field-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .field-wrap input,
    .field-wrap select {
      width: 100%;
      padding: 22px 14px 8px;
      background: var(--navy-field);
      border: 1.5px solid rgba(255,255,255,0.1);
      color: var(--white);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    .field-wrap select {
      padding-top: 22px;
    }
    .field-wrap input:focus,
    .field-wrap select:focus {
      border-color: var(--red);
    }
    .field-wrap input::placeholder { color: transparent; }
    .field-wrap label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 14px;
      font-family: var(--font);
      transition: all 0.15s;
    }
    .field-wrap input:not(:placeholder-shown) + label,
    .field-wrap input:focus + label {
      top: 10px;
      transform: none;
      font-size: 10px;
      color: var(--red);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field-wrap select ~ label {
      top: 10px !important;
      transform: none !important;
      font-size: 10px !important;
      color: var(--red) !important;
      font-weight: 700 !important;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field-wrap select option { background: #091060; color: #fff; }

    /* Two col fields */
    .field-row {
      display: flex;
      gap: 12px;
    }
    .field-row .field-wrap { flex: 1; }

    /* ── Form eyebrow / headline ──────────────────────────── */
    .form-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 6px;
    }
    .form-headline {
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 24px;
      line-height: 1.2;
    }

    /* ── Legal Text ───────────────────────────────────────── */
    .legal-text {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 12px;
      opacity: 0.75;
    }

    /* ── Processing Overlay ───────────────────────────────── */
    .processing-overlay {
      position: fixed;
      inset: 0;
      background: #061253;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .proc-bar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 260px;
    }
    .proc-pct {
      font-size: 64px;
      font-weight: 900;
      color: var(--red);
      line-height: 1;
      letter-spacing: -3px;
      font-variant-numeric: tabular-nums;
    }
    .proc-track {
      width: 100%;
      height: 6px;
      background: rgba(244,67,54,0.15);
      border-radius: 3px;
      overflow: hidden;
    }
    .proc-fill {
      height: 100%;
      background: var(--red);
      border-radius: 3px;
      box-shadow: 0 0 10px rgba(244,67,54,0.5);
      transition: width 0.3s ease;
    }

    .proc-message {
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      text-align: center;
      min-height: 24px;
      transition: opacity 0.3s;
    }

    .proc-check {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(244,67,54,0.15);
      border: 3px solid var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .proc-check .material-icons-outlined {
      font-size: 36px;
      color: var(--red);
    }
    .proc-approved {
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
    }
    .proc-redirect {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Mobile ───────────────────────────────────────────── */
    @media (max-width: 639px) {
      .app { flex-direction: column; }

      .left-panel {
        flex: none;
        height: auto;
        position: relative;
        padding: 28px 24px;
      }
      .left-main {
        gap: 20px;
        justify-content: flex-start;
      }
      .ssl-badge { display: none; }
      .bullet-list { display: none; }
      .desktop-logo { display: none; }
      .desktop-text { display: none; }
      .mobile-brand-row { display: flex; }

      .right-panel {
        min-height: auto;
        flex: 1;
      }
      .right-inner {
        padding: 32px 20px;
      }

      .stat-row { gap: 0; }

      .step-bar-label { font-size: 8px; }

      .amount-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .amount-row {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 16px 10px;
        gap: 6px;
        margin-bottom: 0;
      }
      .amount-row-desc { display: none; }
      .amount-row-label { font-size: 14px; }
      .amount-row-range { font-size: 12px; }

      .field-row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ── Constants ─────────────────────────────────────────── */
    const STEP_LABELS = ['Amount', 'Name', 'Email', 'Location'];

    const AMOUNTS = [
      { id: 'quick',  label: 'Quick Access',     range: '$100 – $500',    desc: 'Cover a quick expense fast' },
      { id: 'mid',    label: 'Mid-Range',         range: '$500 – $1,000',  desc: 'Bills, groceries, and more' },
      { id: 'solid',  label: 'Solid Advance',     range: '$1,000 – $1,500',desc: 'Bigger expenses covered' },
      { id: 'full',   label: 'Full Access',       range: '$1,500 – $2,000',desc: 'Maximum wage advance' },
    ];

    const US_STATES = [
      'Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut',
      'Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa',
      'Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan',
      'Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire',
      'New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio',
      'Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota',
      'Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia',
      'Wisconsin','Wyoming',
    ];

    /* ── StepBar ────────────────────────────────────────────── */
    const StepBar = ({ current, labels }) => (
      <div
        className="step-bar"
        role="progressbar"
        aria-valuenow={current}
        aria-valuemin={1}
        aria-valuemax={labels.length}
        aria-label={`Step ${current} of ${labels.length}`}
      >
        {labels.map((label, i) => (
          <React.Fragment key={i}>
            <div className="step-bar-item">
              <div className={`step-bar-circle${i < current - 1 ? ' done' : i === current - 1 ? ' active' : ''}`}>
                {i < current - 1 ? '✓' : i + 1}
              </div>
              <div className={`step-bar-label${i === current - 1 ? ' active' : ''}`}>{label}</div>
            </div>
            {i < labels.length - 1 && (
              <div className={`step-bar-line${i < current - 1 ? ' done' : ''}`} />
            )}
          </React.Fragment>
        ))}
      </div>
    );

    /* ── EWA Blurb ──────────────────────────────────────────── */
    const EwaBlurb = () => (
      <div className="ewa-blurb">
        <div className="ewa-blurb-title">What is Early Wage Access?</div>
        <p className="ewa-blurb-body">
          Early Wage Access lets you tap into wages you've already earned before your scheduled payday —
          without interest, fees, or a credit check. It's not a loan. You're simply getting paid for work you've already done.
        </p>
      </div>
    );

    /* ── Step 1 — Amount ────────────────────────────────────── */
    const Step1 = ({ onContinue, selected, setSelected }) => (
      <div className="step-pane" key="step1">
        <StepBar current={1} labels={STEP_LABELS} />
        <div className="step-headline">How much do you need?</div>
        <div className="amount-list" role="radiogroup" aria-label="Select advance amount">
          {AMOUNTS.map(a => (
            <div
              key={a.id}
              className={`amount-row${selected === a.id ? ' selected' : ''}`}
              onClick={() => setSelected(a.id)}
              role="radio"
              aria-checked={selected === a.id}
              tabIndex={0}
              onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setSelected(a.id); } }}
            >
              <div className="amount-radio">
                <div className="amount-radio-dot" />
              </div>
              <div>
                <div className="amount-row-label">{a.label}</div>
                <div className="amount-row-range">{a.range}</div>
                <div className="amount-row-desc">{a.desc}</div>
              </div>
            </div>
          ))}
        </div>
        <button
          className="btn-primary"
          disabled={!selected}
          onClick={onContinue}
        >
          Continue →
        </button>
        <p className="step-note">Not a loan. You're accessing wages already earned.</p>
        <EwaBlurb />
      </div>
    );

    /* ── Form Wizard ────────────────────────────────────────── */
    const FormWizard = ({ onSubmit }) => {
      const [subStep, setSubStep] = useState(1);
      const [form, setForm] = useState({
        firstName: 'Jason',
        lastName: 'Williams',
        email: 'jason@epcvip.com',
        age: '',
        state: '',
      });
      const [errors, setErrors] = useState({});

      const set = (field, val) => {
        setForm(f => ({ ...f, [field]: val }));
        setErrors(e => ({ ...e, [field]: '' }));
      };

      const validateStep = (step) => {
        const errs = {};
        if (step === 1) {
          if (!form.firstName.trim()) errs.firstName = 'Required';
          if (!form.lastName.trim()) errs.lastName = 'Required';
        }
        if (step === 2) {
          if (!form.email.trim()) {
            errs.email = 'Required';
          } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) {
            errs.email = 'Enter a valid email';
          }
        }
        if (step === 3) {
          const ageNum = parseInt(form.age, 10);
          if (!form.age) errs.age = 'Required';
          else if (isNaN(ageNum) || ageNum < 18 || ageNum > 99) errs.age = 'Must be 18–99';
          if (!form.state) errs.state = 'Required';
        }
        return errs;
      };

      const next = () => {
        const errs = validateStep(subStep);
        if (Object.keys(errs).length) { setErrors(errs); return; }
        if (subStep < 3) { setSubStep(s => s + 1); }
        else { onSubmit(); }
      };

      const back = () => {
        if (subStep > 1) setSubStep(s => s - 1);
      };

      const currentGlobalStep = subStep + 1; // overall: step 1 was amount

      return (
        <div>
          {subStep === 1 && (
            <div className="step-pane" key="wiz1">
              <StepBar current={currentGlobalStep} labels={STEP_LABELS} />
              <div className="form-eyebrow">Your Name</div>
              <div className="form-headline">What's your name?</div>
              <div className="field-row">
                <div className="field-wrap">
                  <input
                    type="text"
                    id="firstName"
                    placeholder=" "
                    value={form.firstName}
                    onChange={e => set('firstName', e.target.value)}
                    autoComplete="given-name"
                    aria-label="First name"
                  />
                  <label htmlFor="firstName">First Name</label>
                </div>
                <div className="field-wrap">
                  <input
                    type="text"
                    id="lastName"
                    placeholder=" "
                    value={form.lastName}
                    onChange={e => set('lastName', e.target.value)}
                    autoComplete="family-name"
                    aria-label="Last name"
                  />
                  <label htmlFor="lastName">Last Name</label>
                </div>
              </div>
              {(errors.firstName || errors.lastName) && (
                <p className="step-note" style={{color:'#f44336', textAlign:'left', marginTop:'-8px', marginBottom:'8px'}}>
                  {errors.firstName || errors.lastName}
                </p>
              )}
              <button className="btn-primary" onClick={next}>Continue →</button>
              <p className="step-note">Your information is protected with 256-bit SSL encryption.</p>
              <EwaBlurb />
            </div>
          )}

          {subStep === 2 && (
            <div className="step-pane" key="wiz2">
              <StepBar current={currentGlobalStep} labels={STEP_LABELS} />
              <button className="back-btn" onClick={back} aria-label="Go back">
                <span className="material-icons-outlined" style={{fontSize:'14px'}}>arrow_back</span>
                Back
              </button>
              <div className="form-eyebrow">Your Email</div>
              <div className="form-headline">Confirm your email</div>
              <div className="field-wrap">
                <input
                  type="email"
                  id="email"
                  placeholder=" "
                  value={form.email}
                  onChange={e => set('email', e.target.value)}
                  autoComplete="email"
                  aria-label="Email address"
                />
                <label htmlFor="email">Email Address</label>
              </div>
              {errors.email && (
                <p className="step-note" style={{color:'#f44336', textAlign:'left', marginTop:'-8px', marginBottom:'8px'}}>
                  {errors.email}
                </p>
              )}
              <button className="btn-primary" onClick={next}>Continue →</button>
              <p className="step-note">We'll send your offer details to this address. No spam, ever.</p>
              <EwaBlurb />
            </div>
          )}

          {subStep === 3 && (
            <div className="step-pane" key="wiz3">
              <StepBar current={currentGlobalStep} labels={STEP_LABELS} />
              <button className="back-btn" onClick={back} aria-label="Go back">
                <span className="material-icons-outlined" style={{fontSize:'14px'}}>arrow_back</span>
                Back
              </button>
              <div className="form-eyebrow">Almost Done</div>
              <div className="form-headline">Just two more details</div>
              <div className="field-row">
                <div className="field-wrap">
                  <input
                    type="text"
                    id="age"
                    placeholder=" "
                    inputMode="numeric"
                    maxLength={2}
                    value={form.age}
                    onChange={e => set('age', e.target.value.replace(/\D/g, ''))}
                    autoComplete="age"
                    aria-label="Age"
                  />
                  <label htmlFor="age">Age</label>
                </div>
                <div className="field-wrap">
                  <select
                    id="state"
                    value={form.state}
                    onChange={e => set('state', e.target.value)}
                    aria-label="State"
                  >
                    <option value="" disabled></option>
                    {US_STATES.map(s => (
                      <option key={s} value={s}>{s}</option>
                    ))}
                  </select>
                  <label htmlFor="state">State</label>
                </div>
              </div>
              {(errors.age || errors.state) && (
                <p className="step-note" style={{color:'#f44336', textAlign:'left', marginTop:'-8px', marginBottom:'8px'}}>
                  {errors.age || errors.state}
                </p>
              )}
              <button className="btn-primary" onClick={next}>Get My Wages →</button>
              <p className="legal-text">
                By submitting, you agree to our Terms of Service and Privacy Policy. We may share your information
                with participating employers and payroll providers to verify your wages. This is not a loan application.
              </p>
              <EwaBlurb />
            </div>
          )}
        </div>
      );
    };

    /* ── Processing Screen ──────────────────────────────────── */
    const PROC_MESSAGES = [
      'Verifying your eligibility…',
      'Connecting to your employer…',
      'Calculating your wage advance…',
      'Preparing your offer…',
      'Almost ready…',
    ];

    const Processing = ({ onDone }) => {
      const [msgIdx, setMsgIdx] = useState(0);
      const [approved, setApproved] = useState(false);
      const [pct, setPct] = useState(0);

      useEffect(() => {
        let idx = 0;
        const interval = setInterval(() => {
          idx++;
          if (idx < PROC_MESSAGES.length) {
            setMsgIdx(idx);
          } else {
            clearInterval(interval);
            setApproved(true);
            setTimeout(() => onDone(), 2000);
          }
        }, 900);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        const timer = setInterval(() => {
          setPct(p => Math.min(p + 1, 94));
        }, 47);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (approved) setPct(100);
      }, [approved]);

      return (
        <div className="processing-overlay" role="status" aria-live="polite" aria-label="Processing your application">
          {!approved ? (
            <>
              <div className="proc-bar-wrap" aria-hidden="true">
                <div className="proc-pct">{pct}%</div>
                <div className="proc-track">
                  <div className="proc-fill" style={{width: `${pct}%`}} />
                </div>
              </div>
              <div className="proc-message">{PROC_MESSAGES[msgIdx]}</div>
            </>
          ) : (
            <>
              <div className="proc-check" aria-hidden="true">
                <span className="material-icons-outlined">check_circle_outline</span>
              </div>
              <div className="proc-approved">You're Approved!</div>
              <div className="proc-redirect">Redirecting to your offer…</div>
            </>
          )}
        </div>
      );
    };

    /* ── Left Panel ─────────────────────────────────────────── */
    const LeftPanel = () => (
      <div className="left-panel">
        <div className="left-main">

          {/* Mobile: eyebrow full-width, then logo + headline side by side */}
          <div className="mobile-brand-row">
            <div className="eyebrow">WiseWage <span style={{color:'#94a3b8'}}>| Early Wage Access Loans</span></div>
            <div className="mobile-logo-headline">
              <img src="logo-wiseloanfronts.png" alt="WiseWage" />
              <h1 className="headline">Access your pay <span className="red">before</span> payday.</h1>
            </div>
          </div>

          {/* Desktop: eyebrow + headline standalone */}
          <div className="desktop-text">
            <div className="eyebrow">WiseWage <span style={{color:'#94a3b8'}}>| Early Wage Access Loans</span></div>
            <h1 className="headline">
              Access your pay <span className="red">before</span> payday.
            </h1>
          </div>

          <div className="stat-row">
            <div className="stat-item">
              <div className="stat-number">$2,000</div>
              <div className="stat-label">Max amount</div>
            </div>
            <div className="stat-item">
              <div className="stat-number">0%</div>
              <div className="stat-label">Interest Rate</div>
            </div>
            <div className="stat-item">
              <div className="stat-number">Same day</div>
              <div className="stat-label">Transfer</div>
            </div>
          </div>

          <ul className="bullet-list" aria-label="Key benefits">
            <li className="bullet-item">
              <span className="material-icons-outlined" aria-hidden="true">check_circle_outline</span>
              <span className="btxt">No credit check required</span>
            </li>
            <li className="bullet-item">
              <span className="material-icons-outlined" aria-hidden="true">account_balance</span>
              <span className="btxt">Direct bank deposit</span>
            </li>
            <li className="bullet-item">
              <span className="material-icons-outlined" aria-hidden="true">timer</span>
              <span className="btxt">Approval in minutes</span>
            </li>
            <li className="bullet-item">
              <span className="material-icons-outlined" aria-hidden="true">lock</span>
              <span className="btxt">Bank-level security</span>
            </li>
          </ul>
        </div>

        <div className="desktop-logo">
          <img src="logo-wiseloanfronts.png" alt="WiseWage" />
        </div>

        <div className="ssl-badge">
          <span className="material-icons-outlined" aria-hidden="true">lock</span>
          <span>256-bit SSL encrypted · Trusted &amp; Secure</span>
        </div>
      </div>
    );

    /* ── App ────────────────────────────────────────────────── */
    const App = () => {
      const [step, setStep] = useState(1);       // 1=amount, 2=personal info wizard
      const [selected, setSelected] = useState(null);
      const [processing, setProcessing] = useState(false);

      return (
        <>
          <div className="bg-layer" aria-hidden="true">
            <div className="bg-grid" />
            <div className="bg-orb bg-orb-1" />
            <div className="bg-orb bg-orb-2" />
          </div>
          {processing && <Processing onDone={() => {}} />}
          <div className="app">
            <LeftPanel />
            <div className="right-panel">
              <div className="right-inner">
                {step === 1 && (
                  <Step1
                    onContinue={() => setStep(2)}
                    selected={selected}
                    setSelected={setSelected}
                  />
                )}
                {step === 2 && (
                  <FormWizard onSubmit={() => setProcessing(true)} />
                )}
              </div>
            </div>
          </div>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
