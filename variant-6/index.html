<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Early Wage Access — Variant 6 Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface-2: #f5f5f5;
  --accent: #4a9c3f;
  --accent-dark: #3a7a30;
  --accent-light: rgba(74,156,63,0.10);
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #d4ead1;
  --brand-green: #4a9c3f;
  --success: #16a34a;
  --font-serif: 'Montserrat', system-ui, sans-serif;
  --font-sans: 'Montserrat', system-ui, sans-serif;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(26,26,46,0.08);
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: var(--font-sans);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#root {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── Red curtain ─── */
.curtain {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: var(--accent);
  pointer-events: none;
  clip-path: polygon(-5% 0,-5% 0,-5% 100%,-5% 100%);
}
@keyframes wipeIn  { from{clip-path:polygon(-5% 0,-5% 0,-5% 100%,-5% 100%)} to{clip-path:polygon(-5% 0,105% 0,105% 100%,-5% 100%)} }
@keyframes wipeOut { from{clip-path:polygon(-5% 0,105% 0,105% 100%,-5% 100%)} to{clip-path:polygon(105% 0,105% 0,105% 100%,105% 100%)} }
.curtain-in  { animation: wipeIn  0.35s cubic-bezier(0.76,0,0.24,1) forwards; }
.curtain-out { animation: wipeOut 0.35s cubic-bezier(0.76,0,0.24,1) forwards; }

/* ─── Site header ─── */
.site-header {
  width: 100%;
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60px;
  flex-shrink: 0;
}
.site-header img { height: 36px; width: auto; }
.logo-fallback {
  font-family: var(--font-serif);
  font-weight: 900;
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.02em;
  display: none;
}

/* ─── Progress bar ─── */
.progress-bar-wrap {
  width: 100%;
  height: 6px;
  background: #e0e8f0;
  flex-shrink: 0;
}
.progress-bar-fill {
  height: 100%;
  background: var(--brand-green);
  border-radius: 0 3px 3px 0;
  transition: width 0.5s ease;
}

/* ─── Flow wrap ─── */
.flow-wrap {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  align-self: center;
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ─── Screen fade ─── */
.screen-fade {
  flex: 1;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════
   SCREEN 1
═══════════════════════════ */
.s1-wrap {
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  flex: 1;
}
.s1-headline {
  font-size: 32px;
  font-weight: 300;
  color: var(--text);
  text-align: center;
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.tip-block {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.tip-quote {
  font-style: italic;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}
.tip-label {
  margin-top: 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.acct-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.acct-card {
  background: #fff;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  min-height: 90px;
}
.acct-card:hover { border-color: #c4b8b0; }
.acct-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.acct-card.selected { border-color: var(--accent); background: var(--accent-light); }
.acct-icon { font-size: 32px; color: var(--text-muted); transition: color 0.15s; }
.acct-card.selected .acct-icon { color: var(--accent); }
.acct-label { font-size: 14px; font-weight: 600; color: var(--text); text-align: center; }
.acct-card-full { grid-column: 1 / -1; }
.s1-btn-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 75px;
}
.btn-back {
  background: none;
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  flex-shrink: 0;
  transition: border-color 0.15s;
}
.btn-back:hover { border-color: var(--text-muted); }
.btn-continue {
  flex: 1;
  min-height: 52px;
  background: var(--brand-green);
  color: #fff;
  border: none;
  border-radius: 100px;
  font-family: var(--font-sans);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.btn-continue:hover { background: #3d8434; }
.btn-continue:active { transform: scale(0.98); }
.btn-continue:disabled { background: #bbb; cursor: not-allowed; }
.ssl-footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  padding-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.ssl-footer .material-icons-outlined { font-size: 13px; }

/* ═══════════════════════════
   SCREEN 2
═══════════════════════════ */
.s2-container {
  position: fixed;
  inset: 0;
  z-index: 5;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  animation: fadeUp 0.3s ease both;
}
@media (min-width: 640px) {
  .s2-container { flex-direction: row; }
}
.split-left {
  background: #f0ede6;
  color: var(--text);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
@media (min-width: 640px) {
  .split-left {
    flex: 0 0 42%;
    min-height: 100vh;
    position: sticky;
    top: 0;
    padding: 48px 40px;
    gap: 24px;
    justify-content: center;
  }
}
.split-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
}
.split-headline {
  font-family: var(--font-serif);
  font-size: clamp(28px,4vw,48px);
  font-weight: 900;
  font-style: italic;
  line-height: 1.15;
  color: var(--text);
}
.split-headline em { font-style: normal; color: var(--accent); }
.split-red-rule { width: 48px; height: 3px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }
.split-bullets { display: flex; flex-direction: column; gap: 12px; }
.split-bullets.desktop-only { display: none; }
@media (min-width: 640px) { .split-bullets.desktop-only { display: flex; } }
.split-bullet { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; line-height: 1.4; }
.split-bullet-check { color: var(--accent); font-weight: 700; font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.split-ssl {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: rgba(26,26,46,0.55);
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid rgba(26,26,46,0.15);
}
@media (min-width: 640px) { .split-ssl { display: flex; } }
.split-ssl .material-icons-outlined { font-size: 14px; }
.split-right {
  flex: 1;
  padding: 24px 20px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
}
@media (min-width: 640px) {
  .split-right {
    padding: 40px 32px;
    max-width: 540px;
    margin: 0 auto;
  }
}
.form-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
}
.form-headline {
  font-family: var(--font-serif);
  font-size: clamp(22px,3vw,28px);
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.form-fields { display: flex; flex-direction: column; gap: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 639px) { .form-row { grid-template-columns: 1fr; } }
.form-field { position: relative; }
.form-field input,
.form-field select {
  width: 100%;
  font-size: 16px;
  font-family: var(--font-sans);
  color: var(--text);
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 14px 8px;
  outline: none;
  transition: border-color 0.15s;
  appearance: none;
  -webkit-appearance: none;
}
.form-field input::placeholder { color: transparent; }
.form-field input:focus,
.form-field select:focus { border-color: var(--accent); }
.form-field input.err,
.form-field select.err { border-color: var(--accent); }
.form-field label {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--text-muted);
  pointer-events: none;
  transition: top 0.15s, font-size 0.15s, color 0.15s, transform 0.15s;
  white-space: nowrap;
}
.form-field input:not(:placeholder-shown) + label,
.form-field input:focus + label,
.form-field select.has-value + label {
  top: 10px;
  transform: none;
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.select-wrap { position: relative; }
.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 12px;
}
.btn-cta-red {
  width: 100%;
  min-height: 52px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.02em;
}
.btn-cta-red:hover { background: var(--accent-dark); }
.btn-cta-red:active { transform: scale(0.99); }
.legal-divider { border: none; border-top: 1px solid var(--border); margin: 0; }
.legal-text { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

/* ═══════════════════════════
   SCREEN 3
═══════════════════════════ */
.s3-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  gap: 32px;
}
.scan-doc {
  width: min(260px,80vw);
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  position: relative;
  overflow: hidden;
  padding: 0;
}
.scan-doc-header {
  padding: 16px 20px 10px;
  border-bottom: 2px solid var(--text);
  margin-bottom: 4px;
}
.scan-doc-masthead {
  font-family: var(--font-serif);
  font-size: 13px;
  font-weight: 900;
  color: var(--text);
  text-align: center;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.scan-doc-dateline {
  font-size: 8px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 3px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.scan-lines {
  padding: 8px 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.scan-line {
  height: 8px;
  border-radius: 2px;
  background: #ece8e1;
  transition: background 0.3s ease;
}
.scan-line.scanned { background: rgba(230,57,70,0.18); }
.scan-beam {
  position: absolute;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg,transparent,var(--accent),transparent);
  box-shadow: 0 0 12px var(--accent);
  pointer-events: none;
  transition: none;
}
.scan-status {
  text-align: center;
  min-height: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.scan-msg {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 16px;
  color: var(--text-muted);
  transition: opacity 0.3s ease;
}
.scan-msg.found {
  font-style: normal;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
}
.scan-dots { display: flex; gap: 6px; margin-top: 4px; }
.scan-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  animation: dotPulse 1.4s ease-in-out infinite;
}
.scan-dot:nth-child(2) { animation-delay: 0.2s; }
.scan-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
  40%          { opacity: 1;   transform: scale(1); }
}

/* ═══════════════════════════
   SCREEN 4
═══════════════════════════ */
.s4-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 32px 0 24px;
  overflow: hidden;
}
.s4-header {
  padding: 0 20px;
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
}
.s4-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.s4-headline {
  font-family: var(--font-serif);
  font-size: clamp(24px,5vw,34px);
  font-weight: 900;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 6px;
}
.s4-sub {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
}
/* Carousel */
.carousel-area { padding: 0 20px; position: relative; }
.carousel-viewport {
  overflow: hidden;
  width: 100%;
  border-radius: var(--radius);
}
.carousel-track {
  display: flex;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.carousel-slide {
  flex: 0 0 100%;
  min-width: 100%;
  padding: 4px 2px 8px;
}
/* Nav row */
.carousel-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-top: 16px;
}
.carousel-arrow {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: border-color 0.15s, background 0.15s, color 0.15s;
  color: var(--text);
  flex-shrink: 0;
}
.carousel-arrow:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.carousel-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.carousel-dots { display: flex; gap: 8px; }
.c-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  border: none;
  padding: 0;
  transition: background 0.2s, transform 0.2s;
}
.c-dot.active { background: var(--accent); transform: scale(1.25); }
/* Offer card */
.offer-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.offer-card.card-visible { opacity: 1; transform: translateY(0); }
.offer-card-top {
  padding: 20px 20px 16px;
  border-left-width: 6px;
  border-left-style: solid;
}
.offer-best-badge {
  font-family: var(--font-serif);
  font-size: 11px;
  font-weight: 700;
  font-style: italic;
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}
.offer-logo-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.offer-logo { height: 28px; width: auto; object-fit: contain; }
.offer-logo-name {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 900;
  color: var(--text);
  display: none;
}
.offer-delivery-pill {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 3px 8px;
  white-space: nowrap;
}
.offer-tagline { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.offer-amount-display {
  font-family: var(--font-serif);
  font-size: 52px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
}
.offer-dollar {
  font-size: 32px;
  vertical-align: top;
  margin-top: 10px;
  display: inline-block;
}
.offer-card-body {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.amount-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.amount-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.amount-pill {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  background: #fff;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
  min-height: 36px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.offer-cta {
  width: 100%;
  min-height: 52px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.offer-cta:hover { opacity: 0.9; }
.offer-cta:active { transform: scale(0.99); }
.offer-trust { font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.4; }
.s4-trust-footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  padding: 12px 20px 8px;
  line-height: 1.5;
}

/* ─── Responsive ─── */
@media (max-width: 480px) {
  .s1-headline { font-size: 26px; }
  .s4-headline { font-size: 22px; }
  .offer-amount-display { font-size: 44px; }
}
@media (prefers-reduced-motion: reduce) {
  .curtain, .curtain-in, .curtain-out { animation: none; clip-path: none; }
  .scan-beam { display: none; }
  .offer-card { transition: none; }
}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── Data ─── */
const userData = { firstName: "Jason", email: "jason@epcvip.com" };

const LINE_WIDTHS = [80,100,65,90,55,85,70,100,60,80,75,90,45,100];

const ewaOffers = [
  {
    id:"dave", name:"Dave", logo:"../media/dave.png", logoFilter:"brightness(0)",
    bclr:"#1a7a32", badge:"Your best match",
    tagline:"You're pre-qualified for", maxAmt:500, amounts:[100,200,300,400,500],
    delivery:"Instant Transfer",

function Screen2({ onSubmit }) {
  const [form, setForm] = useState({
    firstName: userData.firstName,
    lastName: 'Williams',
    email: userData.email,
    age: '',
    state: ''
  });
  const [errors, setErrors] = useState({});

  const set = (field, val) => setForm(f => ({...f, [field]: val}));

  const validate = () => {
    const e = {};
    if (!form.firstName.trim()) e.firstName = true;
    if (!form.lastName.trim())  e.lastName  = true;
    if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) e.email = true;
    const age = parseInt(form.age, 10);
    if (!form.age || isNaN(age) || age < 18 || age > 99) e.age = true;
    if (!form.state) e.state = true;
    return e;
  };

  const handleSubmit = (ev) => {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    onSubmit();
  };

  const fi = (field) => ({
    value: form[field],
    onChange: ev => { set(field, ev.target.value); setErrors(e => ({...e, [field]: false})); },
    className: errors[field] ? 'err' : undefined
  });

  return (
    <div className="s2-container">
      {/* Left brand panel */}
      <div className="split-left">
        <p className="split-eyebrow">Early Wage Access</p>
        <h2 className="split-headline">

          on your<br/>
          <em>schedule.</em>
        </h2>
        <div className="split-red-rule" />
        <ul className="split-bullets desktop-only" role="list">
          {['No bank account required','Access wages you\'ve already earned','No interest, no hidden fees'].map(t => (
            <li key={t} className="split-bullet">
              <span className="split-bullet-check">✓</span>
              <span>{t}</span>
            </li>
          ))}
        </ul>
        <div className="split-ssl">
          <span className="material-icons-outlined">lock</span>
          256-bit SSL encrypted
        </div>
      </div>

      {/* Right form panel */}
      <div className="split-right">
        <p className="form-eyebrow">Early Wage Access</p>
        <h3 className="form-headline">Tell us about yourself</h3>

        <form onSubmit={handleSubmit} noValidate className="form-fields">
          <div className="form-row">
            <div className="form-field">
              <input type="text" id="firstName" placeholder=" " autoComplete="given-name" {...fi('firstName')} />
              <label htmlFor="firstName">First Name</label>
            </div>
            <div className="form-field">
              <input type="text" id="lastName" placeholder=" " autoComplete="family-name" {...fi('lastName')} />
              <label htmlFor="lastName">Last Name</label>
            </div>
          </div>

          <div className="form-field">
            <input type="email" id="email" placeholder=" " autoComplete="email" {...fi('email')} />
            <label htmlFor="email">Email Address</label>
          </div>

          <div className="form-field">
            <input
              type="text"
              inputMode="numeric"
              pattern="[0-9]*"
              id="age"
              placeholder=" "
              {...fi('age')}
            />
            <label htmlFor="age">Age</label>
          </div>

          <div className="form-field select-wrap">
            <select
              id="state"
              value={form.state}
              onChange={ev => { set('state', ev.target.value); setErrors(e => ({...e, state:false})); }}
              className={`${form.state ? 'has-value' : ''}${errors.state ? ' err' : ''}`}
            >
              <option value="" disabled> </option>
              {US_STATES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <label htmlFor="state">State</label>
          </div>

          <button type="submit" className="btn-cta-red" style={{marginTop:'6px'}}>
            Find My Options →
          </button>
        </form>

        <hr className="legal-divider" />
        <p className="legal-text">By clicking "Find My Options," you agree to our Terms of Service and Privacy Policy and consent to be contacted regarding your earned wage access options. This is not a loan application.</p>
        <p className="legal-text">Earned wage access products are not loans. You are accessing wages you have already earned. No interest is charged. Repayment is automatic on your next payday.</p>
      </div>
    </div>
  );
}

const SCAN_MSGS = [
  "Reading your profile...",
  "Checking wage eligibility...",
  "Matching offers...",
  "Found 3 options for you!"
];

function Screen3({ onDone }) {
  const [beamPct, setBeamPct] = useState(0);
  const [scanned, setScanned] = useState(Array(14).fill(false));
  const [msgIdx, setMsgIdx] = useState(0);
  const rafRef = useRef(null);
  const startRef = useRef(null);
  const DURATION = 3500;
  const docRef = useRef(null);

  useEffect(() => {
    const animate = (ts) => {
      if (!startRef.current) startRef.current = ts;
      const elapsed = ts - startRef.current;
      const progress = Math.min(elapsed / DURATION, 1);

      // Beam position as % of doc scrollHeight
      setBeamPct(progress * 100);

      // Line scanned states
      setScanned(prev => {
        const next = [...prev];
        let changed = false;
        for (let i = 0; i < 14; i++) {
          const threshold = (i + 1) / 15;
          if (progress > threshold && !next[i]) { next[i] = true; changed = true; }
        }
        return changed ? next : prev;
      });

      // Status messages
      if (elapsed > 2800)       setMsgIdx(3);
      else if (elapsed > 1800)  setMsgIdx(2);
      else if (elapsed > 900)   setMsgIdx(1);

      if (progress < 1) {
        rafRef.current = requestAnimationFrame(animate);
      } else {
        setTimeout(onDone, 500);
      }
    };

    rafRef.current = requestAnimationFrame(animate);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [onDone]);

  // Beam top in px based on doc height
  const docHeight = docRef.current ? docRef.current.offsetHeight : 280;
  const beamTop = (beamPct / 100) * docHeight;

  const isFound = msgIdx === 3;

  return (
    <div className="flow-wrap">
      <div className="screen-fade">
        <div className="s3-wrap">
          <div ref={docRef} className="scan-doc" aria-label="Processing your profile" aria-live="polite">
            <div className="scan-doc-header">
              <div className="scan-doc-masthead">Wage Report</div>
              <div className="scan-doc-dateline">Profile Analysis · Confidential</div>
            </div>
            <div className="scan-lines">
              {LINE_WIDTHS.map((w, i) => (
                <div
                  key={i}
                  className={`scan-line${scanned[i] ? ' scanned' : ''}`}
                  style={{width:`${w}%`}}
                />
              ))}
            </div>
            <div className="scan-beam" style={{top:`${beamTop}px`}} />
          </div>

          <div className="scan-status">
            <p className={`scan-msg${isFound ? ' found' : ''}`}>{SCAN_MSGS[msgIdx]}</p>
            {!isFound && (
              <div className="scan-dots" aria-hidden="true">
                <div className="scan-dot" />
                <div className="scan-dot" />
                <div className="scan-dot" />
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

  const prev = () => { if (activeIdx > 0) setActiveIdx(i => i - 1); };
  const next = () => { if (activeIdx < ewaOffers.length - 1) setActiveIdx(i => i + 1); };

  const offer = ewaOffers[activeIdx];

  return (
    <div className="flow-wrap" style={{overflow:'hidden'}}>
      <div className="screen-fade">
        <div className="s4-wrap">

            </div>

            <div className="carousel-nav">
              <button className="carousel-arrow" onClick={prev} disabled={activeIdx === 0} aria-label="Previous offer">
                <span className="material-icons-outlined" style={{fontSize:'20px'}}>chevron_left</span>
              </button>
              <div className="carousel-dots">
                {ewaOffers.map((_, i) => (

                <span className="material-icons-outlined" style={{fontSize:'20px'}}>chevron_right</span>
              </button>
            </div>
          </div>

          <p className="s4-trust-footer">
            Offers updated daily · Secured by SSL · Not a loan — your earned wages

          <div className="offer-best-badge" style={{color: offer.bclr}}>{offer.badge}</div>

        <div className="offer-logo-row">

            : <img
                src={offer.logo}
                alt={`${offer.name} logo`}
                className="offer-logo"
                style={{filter: offer.logoFilter}}

              />
          }

        </div>
        <p className="offer-tagline">{offer.tagline}</p>
        <div className="offer-amount-display">
          <span className="offer-dollar" style={{color: offer.bclr}}>$</span>

      <div className="offer-card-body">
        <div>
          <p className="amount-label">Choose amount</p>
          <div className="amount-pills">
            {offer.amounts.map(a => {
              const sel = amount === a;
              return (
                <button
                  key={a}
                  className={`amount-pill${sel ? ' selected' : ''}`}
                  style={sel ? {background: offer.bclr, borderColor: offer.bclr, color:'#fff'} : {}}
                  onClick={() => onAmountSelect(a)}
                  aria-pressed={sel}

                  ${a}
                </button>
              );
            })}
          </div>
        </div>

        <button
          className="offer-cta"
          style={{ background: offer.bclr }}
          onClick={() => window.location.href = offer.url}
        >
          {offer.ctaBase} — ${amount}
        </button>

        <p className="offer-trust">{offer.trust}</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════
   ROOT APP
═══════════════════════════ */
function App() {
  const [screen, setScreen] = useState(1);
  const [curtain, setCurtain] = useState(null); // null | 'in' | 'out'

  const progressPct = screen === 1 ? 75 : screen === 3 ? 88 : 100;

  const doWipe = useCallback(async (toScreen) => {
    setCurtain('in');
    await new Promise(r => setTimeout(r, 380));
    setScreen(toScreen);
    setCurtain('out');
    await new Promise(r => setTimeout(r, 380));
    setCurtain(null);
  }, []);

  const handleNoBankAccount = useCallback(() => doWipe(2), [doWipe]);
  const handleS1Continue    = useCallback(() => doWipe(2), [doWipe]);
  const handleS2Submit      = useCallback(() => setScreen(3), []);
  const handleScanDone      = useCallback(() => setScreen(4), []);

  return (
    <div style={{display:'flex', flexDirection:'column', minHeight:'100vh', alignItems:'stretch'}}>
      {/* Red curtain overlay */}
      {curtain && (
        <div
          className={`curtain curtain-${curtain}`}
          aria-hidden="true"
        />
      )}

      {/* Header + progress — hidden on screen 2 (fullscreen split) */}
      {screen !== 2 && (
        <>
          <SiteHeader />
          <ProgressBar pct={progressPct} />
        </>
      )}

      {screen === 1 && (
        <Screen1
          onSelectNone={handleNoBankAccount}
          onContinue={handleS1Continue}
        />
      )}

      {screen === 2 && (
        <Screen2 onSubmit={handleS2Submit} />
      )}

      {screen === 3 && (
        <Screen3 onDone={handleScanDone} />
      )}

      {screen === 4 && (
        <Screen4 />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
