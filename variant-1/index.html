<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find EWA Options | Get Paid Before Payday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ========================
       DESIGN TOKENS — V1 SHARP & MODERN
    ======================== */
    :root {
      --bg:           #ffffff;
      --surface:      #f5faf5;
      --surface-2:    #eef6ee;
      --accent:       #4a9c3f;
      --accent-light: #dcf5da;
      --accent-dark:  #3a7a30;
      --text:         #0f172a;
      --text-muted:   #64748b;
      --border:       #e2e8f0;
      --brand-green:  #4a9c3f;
      --success:      #16a34a;
      --radius:       10px;
      --shadow:       0 2px 8px rgba(74,156,63,0.10);
      --font:         'Montserrat', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: #ffffff;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* ========================
       FLOW WRAPPER
    ======================== */
    .flow-wrap {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      align-self: center;
      flex: 1;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ========================
       SITE HEADER (logo bar)
    ======================== */
    .site-header {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }
    .site-header img {
      height: 40px;
      width: auto;
    }

    /* ========================
       PROGRESS BAR
    ======================== */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e0e0e0;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--brand-green);
      transition: width 0.5s ease, background 0.5s ease;
    }

    /* ========================
       PAGE OVERLAY (ink ripple)
    ======================== */
    .page-overlay {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 999;
      pointer-events: none;
      clip-path: circle(0% at 50% 72%);
    }
    @keyframes overlayExpand {
      from { clip-path: circle(0% at 50% 72%); }
      to   { clip-path: circle(170% at 50% 72%); }
    }
    @keyframes overlayRetract {
      from { clip-path: circle(170% at 50% 4%); }
      to   { clip-path: circle(0% at 50% 4%); }
    }
    .overlay-expanding  { animation: overlayExpand  0.42s cubic-bezier(0.4,0,0.2,1) forwards; }
    .overlay-retracting { animation: overlayRetract 0.48s cubic-bezier(0.4,0,0.2,1) forwards; }

    /* ========================
       SCREEN MANAGEMENT
    ======================== */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 24px 20px 32px;
    }
    .screen.active {
      display: flex;
      animation: fadeSlideUp 0.3s ease;
    }
    .screen.overlay-reveal { animation: none !important; }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #screen1 { padding-top: 0; }
    #screen2 { padding: 0; overflow: hidden; }

    /* ========================
       SCREEN 1 STYLES
    ======================== */
    .s1-headline {
      font-size: 32px;
      font-weight: 300;
      color: #0f172a;
      text-align: center;
      margin: 20px 0 18px;
      line-height: 1.2;
      text-wrap: balance;
      letter-spacing: -0.5px;
    }

    .tip-block {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .tip-block p {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .tip-toggle {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .no-bank-card { grid-column: 1 / -1; }

    .acct-card {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, transform 0.14s, box-shadow 0.18s;
      background: var(--bg);
      min-height: 90px;
    }
    .acct-card:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74,156,63,0.15);
    }
    .acct-card:focus { outline: 3px solid var(--accent); outline-offset: 2px; }
    .acct-card.selected { border-color: var(--accent); background: var(--accent-light); }
    .acct-card .card-icon { font-size: 36px; line-height: 1; color: var(--accent); }
    .acct-card .card-label { font-size: 13px; font-weight: 600; color: var(--text); text-align: center; letter-spacing: 0.01em; }

    .s1-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 75px;
    }
    .btn-back {
      width: 52px; height: 52px; min-height: 52px; flex-shrink: 0;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: border-color 0.18s, color 0.18s;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .btn-back:focus { outline: 3px solid var(--accent); outline-offset: 2px; }

    .btn-continue {
      flex: 1; padding: 16px; min-height: 52px;
      background: var(--accent); color: #fff;
      font-size: 16px; font-weight: 700;
      border: none; border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.18s, transform 0.1s;
      font-family: var(--font);
      letter-spacing: 0.01em;
      position: relative; overflow: hidden;
    }
    .btn-continue:hover { opacity: 0.92; }
    .btn-continue:active { transform: scale(0.98); }
    .btn-continue:focus { outline: 3px solid var(--accent-dark); outline-offset: 2px; }
    .btn-continue::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.22) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: none;
    }
    .btn-continue:hover::after { animation: shimmer 0.55s forwards; }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    .ssl-footer {
      text-align: center; font-size: 12px; color: var(--text-muted);
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid #f0f0f0; line-height: 1.6;
    }
    .ssl-footer a { color: var(--text-muted); text-decoration: underline; }

    /* ========================
       SCREEN 2 — CHAT FORM
    ======================== */
    .chat-appbar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-bot-avatar {
      width: 36px; height: 36px; border-radius: 18px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-bot-avatar .material-icons-outlined { font-size: 20px; color: white; }
    .chat-bot-name { font-size: 18px; font-weight: 700; color: var(--text); }
    .chat-bot-status { font-size: 11px; color: var(--accent); font-weight: 600; margin-top: 1px; }

    .chat-prog-wrap { height: 3px; background: #e5e7eb; flex-shrink: 0; }
    .chat-prog-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble-row { display: flex; gap: 8px; align-items: flex-end; }
    .bubble-row.user { flex-direction: row-reverse; }

    .b-avatar {
      width: 28px; height: 28px; border-radius: 14px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .b-avatar .material-icons-outlined { font-size: 15px; color: white; }

    .bubble {
      max-width: 80%; padding: 10px 14px; border-radius: 18px;
      font-size: 13px; line-height: 1.5; font-weight: 500;
      animation: bubbleIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes bubbleIn {
      from { transform: scale(0.82) translateY(8px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .bubble-bot { background: white; color: var(--text); border-radius: 18px 18px 18px 4px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .bubble-user { background: var(--accent); color: white; border-radius: 18px 18px 4px 18px; }

    .typing-bubble {
      background: white; border-radius: 18px 18px 18px 4px;
      padding: 12px 14px; display: flex; gap: 5px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      animation: bubbleIn 0.2s ease both;
    }
    .typing-bubble span {
      width: 6px; height: 6px; border-radius: 3px;
      background: #9ca3af; animation: dotBounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }

    .chat-chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: flex-end; animation: bubbleIn 0.25s ease both; }
    .chat-chip {
      padding: 9px 16px; border-radius: 20px;
      border: 1.5px solid var(--accent); background: white; color: var(--accent);
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; font-family: var(--font);
    }
    .chat-chip:hover { background: var(--accent); color: white; }
    .chat-chip.chosen { background: var(--accent); color: white; opacity: 0.6; cursor: default; }
    .chat-chip:focus-visible { outline: 2px solid var(--accent-dark); outline-offset: 2px; }

    .age-input-row {
      display: flex; gap: 8px; align-items: center; justify-content: flex-end;
      animation: bubbleIn 0.25s ease both;
    }
    .age-input-row input {
      width: 100px; padding: 9px 12px;
      border-radius: 20px; border: 1.5px solid var(--accent);
      font-size: 14px; font-family: var(--font); font-weight: 600;
      outline: none; color: var(--text); text-align: center;
    }
    .age-input-row input::-webkit-inner-spin-button,
    .age-input-row input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .age-input-row input[type=number] { -moz-appearance: textfield; }
    .age-send-btn {
      padding: 9px 16px; border-radius: 20px; border: none;
      background: var(--accent); color: white;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: var(--font); transition: opacity 0.15s;
    }
    .age-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .age-send-btn:not(:disabled) { opacity: 1; }
    .email-input-row input { width: 190px; text-align: left; }

    .chat-cta-area { padding: 12px 16px 20px; flex-shrink: 0; }
    .chat-cta-btn {
      display: block; width: 100%; padding: 17px;
      background: var(--accent); color: white;
      font-size: 15px; font-weight: 700;
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: opacity 0.18s; font-family: var(--font);
      box-shadow: 0 4px 18px rgba(74,156,63,0.22);
    }
    .chat-cta-btn:hover { opacity: 0.9; }
    .chat-cta-btn:focus { outline: 3px solid var(--accent-dark); outline-offset: 2px; }

    /* ========================
       SCREEN 3 — TYPEWRITER TERMINAL
    ======================== */
    .s3-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0; padding: 20px;
    }
    .terminal-badge {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px 6px 0 0; padding: 8px 16px;
      width: 100%; max-width: 340px;
      display: flex; align-items: center; gap: 8px;
    }
    .terminal-dots { display: flex; gap: 5px; }
    .terminal-dots span { width: 9px; height: 9px; border-radius: 50%; display: block; }
    .terminal-dots span:nth-child(1) { background: #ef4444; }
    .terminal-dots span:nth-child(2) { background: #f59e0b; }
    .terminal-dots span:nth-child(3) { background: #22c55e; }
    .terminal-title { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.03em; }

    .typewriter-terminal {
      font-family: var(--font-mono); font-size: 14px;
      color: var(--text); line-height: 2; min-height: 200px;
      width: 100%; max-width: 340px;
      background: var(--surface); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 var(--radius) var(--radius);
      padding: 16px 18px 18px; text-align: left;
      display: flex; flex-direction: column;
    }
    .tw-line { display: block; white-space: pre-wrap; word-break: break-all; }
    .tw-line .tw-prompt { color: var(--accent); font-weight: 700; }
    .tw-line .tw-text { color: var(--text); }

    .cursor {
      display: inline-block; width: 8px; height: 1em;
      background: var(--accent); vertical-align: text-bottom;
      margin-left: 1px; animation: blink 0.7s infinite;
    }
    @keyframes blink {
      0%, 49%  { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .tw-found {
      display: inline-block; color: var(--accent);
      font-weight: 700; font-family: var(--font-mono); font-size: 14px; opacity: 0;
    }
    .tw-found.stamp-in {
      animation: stampIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes stampIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ========================
       SCREEN 4 — COMPARISON TABLE
    ======================== */
    .s4-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 16px 28px; }

    .s4-header { margin-bottom: 16px; }
    .s4-headline {
      font-size: 20px; font-weight: 800; color: var(--text);
      margin-bottom: 3px; letter-spacing: -0.3px;
      display: flex; align-items: baseline; gap: 8px;
    }
    .s4-count-badge {
      font-size: 12px; font-weight: 700;
      color: var(--accent); background: var(--accent-light);
      border-radius: 99px; padding: 2px 9px; letter-spacing: 0.02em;
      display: inline-block; min-width: 24px; text-align: center;
    }
    .s4-sub { font-size: 13px; color: var(--text-muted); }

    .s4-progress-sweep {
      position: fixed; top: 0; left: 0; height: 3px; width: 0;
      background: var(--accent); z-index: 100; border-radius: 0 2px 2px 0;
    }
    .s4-progress-sweep.sweep {
      animation: progressSweep 0.7s 0.1s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes progressSweep {
      from { width: 0; opacity: 1; }
      to   { width: 100%; opacity: 0; }
    }

    /* Comparison table */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.09); }
    .compare-table { width: 100%; border-collapse: collapse; background: white; min-width: 320px; border-radius: 14px; overflow: hidden; }

    .compare-table th, .compare-table td {
      padding: 13px 10px; text-align: center;
      font-size: 12px; border-bottom: 1px solid #f0f0f0;
      vertical-align: middle; font-family: var(--font);
    }
    .compare-table th:first-child,
    .compare-table td:first-child {
      text-align: left; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: #9ca3af; background: #fafafa; padding-left: 14px;
      white-space: nowrap;
    }
    .compare-table tr:last-child td { border-bottom: none; }

    /* Best column */
    .col-best { background: #f0fdf4; }
    thead .col-best { background: var(--accent); color: white; }
    thead th { padding-top: 16px; padding-bottom: 12px; }

    /* Logo in header */
    .th-logo-wrap {
      width: 70px; height: 36px; border-radius: 8px;
      background: white; border: 1px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      padding: 5px; margin: 0 auto 6px;
      overflow: hidden;
    }
    thead .col-best .th-logo-wrap { border-color: rgba(255,255,255,0.5); }
    .th-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }

    .th-name { font-size: 12px; font-weight: 700; margin-top: 2px; }
    thead .col-best .th-name { color: white; }
    thead th:not(.col-best) .th-name { color: var(--text); }

    .col-best td { font-weight: 600; color: #166534; }

    .check-icon { color: var(--accent); font-size: 16px; vertical-align: middle; }
    .stars { color: #f59e0b; }

    /* CTA row */
    .cta-row td { padding: 14px 10px 18px; border-bottom: none; }
    .tbl-cta {
      display: block; width: 100%; padding: 11px 8px;
      border-radius: 10px; font-size: 12px; font-weight: 700;
      border: none; cursor: pointer; font-family: var(--font);
      transition: opacity 0.15s;
    }
    .tbl-cta:hover { opacity: 0.88; }
    .tbl-cta:focus-visible { outline: 2px solid var(--accent-dark); outline-offset: 2px; }
    .tbl-cta-primary { background: var(--accent); color: white; }
    .tbl-cta-secondary { background: #f0f0f0; color: #333; }

    .s4-trust {
      text-align: center; font-size: 12px;
      color: var(--text-muted); margin-top: 16px;
    }

    .legal-divider { height: 1px; background: var(--border); margin: 18px 0 14px; }
    .legal-text { font-size: 11px; color: var(--text-muted); line-height: 1.65; }
    .legal-text strong { color: var(--text); font-weight: 600; }
    .legal-text p { margin-bottom: 10px; }
    .legal-text p:last-child { margin-bottom: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const US_STATES = [
      'Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut',
      'Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa',
      'Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan',
      'Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada',
      'New Hampshire','New Jersey','New Mexico','New York','North Carolina',
      'North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island',
      'South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont',
      'Virginia','Washington','West Virginia','Wisconsin','Wyoming'
    ];

    const TYPEWRITER_LINES = [
      '> Analyzing your profile...',
      '> Checking EWA eligibility...',
      '> Scanning 47 providers...',
      '> No bank account? We\'ve got you.',
      '> Matching offers to your state...',
      '> Ranking by approval speed...'
    ];
    const CHAR_DELAY = 35;
    const LINE_PAUSE = 380;

    const TABLE_ROWS = [
      { label: 'Max Advance', dave: 'Up to $500', albert: 'Up to $250', earnin: '$100/day' },
      { label: 'Speed',       dave: 'Instant',    albert: 'Instant',    earnin: 'Lightning Speed' },
      { label: 'Fee',         dave: 'Optional tip', albert: '$0 (free trial)', earnin: 'Pay what you want' },
      { label: 'Credit Check', dave: 'None ✓',   albert: 'None ✓',    earnin: 'None ✓' },
      { label: 'Rating',      dave: '★★★★★ 4.8', albert: '★★★★★ 4.7', earnin: '★★★★★ 4.6' },
    ];

    /* ======================== SCREEN 4 — COMPARISON TABLE ======================== */
    function Screen4({ showSweep }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => { window.scrollTo(0,0); setTimeout(() => setVisible(true), 80); }, []);

      return (
        <>
          <div className={`s4-progress-sweep${showSweep ? ' sweep' : ''}`} />
          <div className="s4-wrap" style={{ opacity: visible ? 1 : 0, transition: 'opacity 0.4s ease' }}>
            <div className="s4-header">
              <h2 className="s4-headline">
                Your matched offers
                <span className="s4-count-badge">3</span>
              </h2>
              <p className="s4-sub">Compare your options and apply below</p>
            </div>

            <div className="table-scroll">
              <table className="compare-table">
                <thead>
                  <tr>
                    <th style={{ background: '#fafafa' }} />
                    <th className="col-best">
                      <div className="th-logo-wrap">
                        <img src="../media/dave.png" alt="Dave" />
                      </div>
                      <div className="th-name">Dave</div>
                    </th>
                    <th>
                      <div className="th-logo-wrap" style={{ borderColor: '#e5e7eb' }}>
                        <img src="../media/albert.png" alt="Albert" />
                      </div>
                      <div className="th-name">Albert</div>
                    </th>
                    <th>
                      <div className="th-logo-wrap" style={{ borderColor: '#e5e7eb' }}>
                        <img src="../media/EarnIn_Logo.png" alt="Earnin" />
                      </div>
                      <div className="th-name">Earnin</div>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  {TABLE_ROWS.map(row => (
                    <tr key={row.label}>
                      <td>{row.label}</td>
                      <td className="col-best">{row.dave}</td>
                      <td>{row.albert}</td>
                      <td>{row.earnin}</td>
                    </tr>
                  ))}
                  <tr className="cta-row">
                    <td />
                    <td className="col-best">
                      <button className="tbl-cta tbl-cta-primary" aria-label="Select Dave offer">Select Offer</button>
                    </td>
                    <td>
                      <button className="tbl-cta tbl-cta-secondary" aria-label="Select Albert offer">Select Offer</button>
                    </td>
                    <td>
                      <button className="tbl-cta tbl-cta-secondary" aria-label="Select Earnin offer">Select Offer</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div className="s4-trust">🔒 256-bit SSL · We never share your data without consent</div>

            <div className="legal-divider" />
            <div className="legal-text">
              <p><strong>What is Early Wage Access?</strong><br />
              EWA services let you access earned wages before payday. Unlike traditional financial products, advances are based on hours already worked — not your credit score. Most services charge a small optional tip or subscription fee.</p>
              <p>By clicking "Show Me EWA Offers," you may be matched with third-party EWA providers. EPCVIP does not guarantee approval, funding amounts, or terms. Availability may vary by state.</p>
            </div>
          </div>
        </>
      );
    }

    /* ======================== SCREEN 3 — TYPEWRITER ======================== */
    function Screen3({ onComplete }) {
      const [lines, setLines] = useState([]);
      const [foundVisible, setFoundVisible] = useState(false);
      const [termTitle, setTermTitle] = useState('ewa-match — searching');
      const cursorLineRef = useRef(-1);

      useEffect(() => {
        let totalDelay = 0;
        const timeouts = [];

        TYPEWRITER_LINES.forEach((lineText, lineIdx) => {
          const lineStart = totalDelay;
          const restText = lineText.slice(1);
          const t1 = setTimeout(() => {
            setLines(prev => [...prev, { idx: lineIdx, text: '', done: false }]);
            cursorLineRef.current = lineIdx;
            let charIdx = 0;
            const typeChar = () => {
              if (charIdx < restText.length) {
                const ch = restText[charIdx++];
                setLines(prev => prev.map(l => l.idx === lineIdx ? { ...l, text: l.text + ch } : l));
                const t = setTimeout(typeChar, CHAR_DELAY);
                timeouts.push(t);
              } else {
                setLines(prev => prev.map(l => l.idx === lineIdx ? { ...l, done: true } : l));
              }
            };
            typeChar();
          }, lineStart);
          timeouts.push(t1);
          totalDelay += lineText.length * CHAR_DELAY + LINE_PAUSE;
        });

        const t2 = setTimeout(() => {
          cursorLineRef.current = -1;
          setFoundVisible(true);
          setTermTitle('ewa-match — 3 offers found');
          const t3 = setTimeout(() => onComplete(), 600);
          timeouts.push(t3);
        }, totalDelay + 300);
        timeouts.push(t2);

        return () => timeouts.forEach(clearTimeout);
      }, []);

      return (
        <div className="s3-wrap">
          <div className="terminal-badge">
            <div className="terminal-dots"><span /><span /><span /></div>
            <span className="terminal-title">{termTitle}</span>
          </div>
          <div className="typewriter-terminal" aria-live="polite" aria-label="Searching for EWA offers">
            {lines.map(line => (
              <span key={line.idx} className="tw-line">
                <span className="tw-prompt">&gt;</span>
                <span className="tw-text">{line.text}</span>
                {!line.done && cursorLineRef.current === line.idx && <span className="cursor" />}
              </span>
            ))}
            {foundVisible && (
              <span className="tw-line" style={{ marginTop: '8px' }}>
                <span className="tw-found stamp-in">✓ 3 offers found for you!</span>
              </span>
            )}
          </div>
        </div>
      );
    }

    /* ======================== SCREEN 2 — CHAT FORM ======================== */
    function Screen2({ onSubmit, setProgressWidth }) {
      const [messages, setMessages] = useState([]);
      const [showTyping, setShowTyping] = useState(false);
      const [phase, setPhase] = useState('init'); // init | awaitEmailConfirm | awaitEmailEdit | awaitAge | awaitState | done
      const [ageVal, setAgeVal] = useState('');
      const [emailVal, setEmailVal] = useState('');
      const [chatProg, setChatProg] = useState(5);
      const [showCta, setShowCta] = useState(false);
      const chatRef = useRef(null);
      const ageInputRef = useRef(null);
      const emailInputRef = useRef(null);
      const timeoutsRef = useRef([]);

      function scroll() {
        setTimeout(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, 60);
      }

      function addBot(content, isHtml) {
        setMessages(prev => [...prev, { id: Date.now() + Math.random(), from: 'bot', content, isHtml }]);
        scroll();
      }

      function addUser(text) {
        setMessages(prev => [...prev, { id: Date.now() + Math.random(), from: 'user', content: text }]);
        scroll();
      }

      function after(ms, fn) {
        const t = setTimeout(fn, ms);
        timeoutsRef.current.push(t);
        return t;
      }

      function showBot(content, isHtml, typingMs, delayBefore = 0) {
        return new Promise(resolve => {
          after(delayBefore, () => {
            setShowTyping(true); scroll();
            after(typingMs, () => {
              setShowTyping(false);
              addBot(content, isHtml);
              resolve();
            });
          });
        });
      }

      useEffect(() => {
        async function runChat() {
          setChatProg(10);
          await showBot("<strong>Hi Jason! No bank account? No problem</strong> — you're still in great shape. I've got some excellent options built for exactly that in the form of an <strong>EWA loan</strong>.", true, 3300, 600);
          await showBot("What is an EWA loan you ask?", false, 1600, 650);
          await showBot("EWA stands for Early Wage Access — it lets you get paid for hours you've <em>already worked</em>, before your actual payday arrives. It's not a traditional loan. There's no credit check, no debt, and no interest. You're simply accessing your own earned money a little early.", true, 4600, 550);
          await showBot("Here's what I already have on file for you:<br/><span style='color:#4a9c3f;font-weight:700'>✓ Name: Jason Williams</span><br/><span style='color:#4a9c3f;font-weight:700'>✓ Email: jason@example.com</span>", true, 2400, 700);
          setChatProg(35);
          await showBot("Does that email look right, or would you like to update it?", false, 1800, 500);
          setPhase('awaitEmailConfirm');
          scroll();
        }
        runChat();
        return () => timeoutsRef.current.forEach(clearTimeout);
      }, []);

      function proceedToAge() {
        showBot("Just two quick questions and I'll find your EWA matches. How old are you?", false, 2100, 400).then(() => {
          setPhase('awaitAge');
          setTimeout(() => { if (ageInputRef.current) ageInputRef.current.focus(); }, 100);
          scroll();
        });
      }

      function confirmEmail(answer) {
        setPhase('init');
        if (answer === 'yes') {
          addUser("Yes, looks good!");
          setChatProg(40);
          proceedToAge();
        } else {
          addUser("No, let me update it");
          showBot("No problem — what's the correct email?", false, 1400, 300).then(() => {
            setPhase('awaitEmailEdit');
            setTimeout(() => { if (emailInputRef.current) emailInputRef.current.focus(); }, 100);
            scroll();
          });
        }
      }

      function submitEmail() {
        if (!emailVal || !emailVal.includes('@')) return;
        setPhase('init');
        addUser(emailVal);
        setChatProg(40);
        showBot("Got it — updated! ✓", false, 900, 300).then(() => {
          proceedToAge();
        });
      }

      function submitAge() {
        const n = parseInt(ageVal, 10);
        if (!ageVal || n < 18 || n > 99) return;
        setPhase('init');
        addUser(String(n));
        setChatProg(70);
        showBot("Got it! And which state are you in?", false, 1800, 450).then(() => {
          setPhase('awaitState');
          scroll();
        });
      }

      function submitState(state) {
        setPhase('init');
        addUser(state === 'Other' ? 'Another state' : state);
        setChatProg(100);
        showBot("Perfect! I found <strong>3 EWA offers</strong> that match your profile and work in your area — no bank account needed. 🎯", true, 2300, 450).then(() => {
          setPhase('done');
          setShowCta(true);
          scroll();
        });
      }

      const ageValid = (() => { const n = parseInt(ageVal, 10); return ageVal && n >= 18 && n <= 99; })();

      return (
        <React.Fragment>
          <div className="chat-appbar">
            <div className="chat-bot-avatar">
              <span className="material-icons-outlined">smart_toy</span>
            </div>
            <div>
              <div className="chat-bot-name">EWA Match Assistant</div>
              <div className="chat-bot-status">● Online — finding your best options</div>
            </div>
          </div>

          <div className="chat-prog-wrap">
            <div className="chat-prog-fill" style={{ width: chatProg + '%' }} />
          </div>

          <div className="chat-area" id="chatArea" ref={chatRef} role="log" aria-live="polite" aria-label="Chat conversation" aria-atomic="false">
            {messages.map(msg => (
              msg.from === 'bot' ? (
                <div key={msg.id} className="bubble-row">
                  <div className="b-avatar"><span className="material-icons-outlined">smart_toy</span></div>
                  <div className="bubble bubble-bot" dangerouslySetInnerHTML={msg.isHtml ? { __html: msg.content } : undefined}>
                    {!msg.isHtml ? msg.content : undefined}
                  </div>
                </div>
              ) : (
                <div key={msg.id} className="bubble-row user">
                  <div className="bubble bubble-user">{msg.content}</div>
                </div>
              )
            ))}

            {showTyping && (
              <div className="bubble-row">
                <div className="b-avatar"><span className="material-icons-outlined">smart_toy</span></div>
                <div className="typing-bubble"><span /><span /><span /></div>
              </div>
            )}

            {phase === 'awaitEmailConfirm' && (
              <div className="chat-chips">
                <button className="chat-chip" onClick={() => confirmEmail('yes')}>Yes, looks good ✓</button>
                <button className="chat-chip" onClick={() => confirmEmail('no')}>No, update it</button>
              </div>
            )}

            {phase === 'awaitEmailEdit' && (
              <div className="age-input-row email-input-row">
                <input
                  ref={emailInputRef}
                  type="email"
                  placeholder="Your email"
                  aria-label="Your email address"
                  value={emailVal}
                  onChange={e => setEmailVal(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && emailVal.includes('@')) submitEmail(); }}
                  autoComplete="email"
                />
                <button
                  className="age-send-btn"
                  disabled={!emailVal || !emailVal.includes('@')}
                  onClick={submitEmail}
                >Send</button>
              </div>
            )}

            {phase === 'awaitAge' && (
              <div className="age-input-row">
                <input
                  ref={ageInputRef}
                  type="number" min="18" max="99"
                  placeholder="Your age"
                  aria-label="Your age"
                  value={ageVal}
                  onChange={e => setAgeVal(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && ageValid) submitAge(); }}
                />
                <button
                  className="age-send-btn"
                  disabled={!ageValid}
                  onClick={submitAge}
                >Send</button>
              </div>
            )}

            {phase === 'awaitState' && (
              <div className="chat-chips">
                {['TX','CA','FL','NY','IL','OH','GA','Other'].map(s => (
                  <button key={s} className="chat-chip" onClick={() => submitState(s)}>{s}</button>
                ))}
              </div>
            )}
          </div>

          {showCta && (
            <div className="chat-cta-area">
              <button className="chat-cta-btn" onClick={onSubmit}>Show Me EWA Offers →</button>
            </div>
          )}
        </React.Fragment>
      );
    }

    /* ======================== SCREEN 1 ======================== */
    function Screen1({ selected, onSelect, onContinue }) {
      return (
        <>
          <h1 className="s1-headline">What type of bank account do you have?</h1>
          <div className="tip-block">
            <p>"Lenders are significantly more likely to fund checking accounts than savings accounts."</p>
            <div className="tip-toggle">A HELPFUL TIP! ∧</div>
          </div>
          <div className="cards-grid">
            {[
              { type: 'checking', icon: 'account_balance', label: 'Checking' },
              { type: 'savings',  icon: 'savings',         label: 'Savings' },
            ].map(({ type, icon, label }) => (
              <div
                key={type}
                className={`acct-card${selected === type ? ' selected' : ''}`}
                role="button" tabIndex={0} aria-pressed={selected === type}
                onClick={() => onSelect(type)}
                onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && (e.preventDefault(), onSelect(type))}
              >
                <span className="material-icons-outlined card-icon" aria-hidden="true">{icon}</span>
                <span className="card-label">{label}</span>
              </div>
            ))}
            <div
              className={`acct-card no-bank-card${selected === 'nobank' ? ' selected' : ''}`}
              role="button" tabIndex={0} aria-pressed={selected === 'nobank'}
              onClick={() => onSelect('nobank')}
              onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && (e.preventDefault(), onSelect('nobank'))}
            >
              <span className="material-icons-outlined card-icon" aria-hidden="true">money_off</span>
              <span className="card-label">No Bank Account</span>
            </div>
          </div>
          <div className="s1-actions">
            <button className="btn-back" onClick={() => window.history.back()} aria-label="Go back">‹</button>
            <button className="btn-continue" onClick={onContinue}>
              {selected === 'nobank' ? 'Find EWA Options →' : 'Continue'}
            </button>
          </div>
          <div className="ssl-footer">
            We use 256 bit SSL technology to encrypt your data.<br />
            <a href="#">Disclosures</a>
          </div>
        </>
      );
    }

    /* ======================== APP ======================== */
    function App() {
      const [screen, setScreen] = useState(1);
      const [accountType, setAccountType] = useState(null);
      const [overlayClass, setOverlayClass] = useState('');
      const [showSweep, setShowSweep] = useState(false);
      const [progressWidth, setProgressWidth] = useState(75);
      const [showProgress, setShowProgress] = useState(true);

      const progressMap = { 1: 75, 2: 85, 3: 92, 4: 100 };

      function rippleTransition(nextScreen) {
        setOverlayClass('overlay-expanding');
        setTimeout(() => {
          setScreen(nextScreen);
          setProgressWidth(progressMap[nextScreen]);
          setShowProgress(nextScreen === 1);
          setOverlayClass('overlay-retracting');
          setTimeout(() => setOverlayClass(''), 500);
        }, 420);
      }

      function fadeTransition(nextScreen) {
        setScreen(nextScreen);
        setProgressWidth(progressMap[nextScreen]);
        setShowProgress(false);
      }

      function handleCardSelect(type) {
        setAccountType(type);
        if (type === 'nobank') setTimeout(() => rippleTransition(2), 160);
      }

      function handleS1Continue() {
        if (!accountType) return;
        rippleTransition(2);
      }

      function handleS2Submit() { fadeTransition(3); }

      function handleS3Complete() {
        setScreen(4);
        setProgressWidth(100);
        setShowProgress(false);
        setTimeout(() => { setShowSweep(true); setTimeout(() => setShowSweep(false), 800); }, 100);
      }

      return (
        <>
          <div className={`page-overlay ${overlayClass}`} />

          <div className="site-header">
            <img src="../media/logo.svg" alt="Fast Loan Advance" />
          </div>

          {showProgress && (
            <div className="progress-bar">
              <div className="progress-fill" style={{ width: progressWidth + '%' }} />
            </div>
          )}

          <div className="flow-wrap">
            <div id="screen1" className={`screen${screen === 1 ? ' active' : ''}`}>
              <Screen1 selected={accountType} onSelect={handleCardSelect} onContinue={handleS1Continue} />
            </div>

            <div id="screen2" className={`screen${screen === 2 ? ' active' : ''}`}>
              {screen === 2 && <Screen2 onSubmit={handleS2Submit} setProgressWidth={setProgressWidth} />}
            </div>

            <div id="screen3" className={`screen${screen === 3 ? ' active' : ''}`}>
              {screen === 3 && <Screen3 onComplete={handleS3Complete} />}
            </div>

            <div id="screen4" className={`screen${screen === 4 ? ' active' : ''}`}>
              {screen === 4 && <Screen4 showSweep={showSweep} />}
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
