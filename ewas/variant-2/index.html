<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EWA — Get Paid Today | Early Wage Access</title>
  <meta name="description" content="Access wages you've already earned before your scheduled payday. Up to $2,000 same day, no credit check, zero fees." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #cd004d;
      --gold-dark: #a8003f;
      --gold-tint: rgba(205,0,77,0.08);
      --gold-border: rgba(205,0,77,0.2);
      --gold-border-light: rgba(205,0,77,0.1);
      --left-bg: #09090b;
      --right-bg: #0f0f0f;
      --card-bg: #1a1a1a;
      --border-dark: #27272a;
      --muted: #71717a;
      --white: #fafafa;
      --font: 'Montserrat', sans-serif;
    }

    html, body {
      height: 100%;
      background: #09090b;
      color: var(--white);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100vh;
    }

    /* ── LAYOUT ────────────────────────────────── */
    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* LEFT PANEL */
    .left-panel {
      background: var(--left-bg);
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      padding: 60px 48px;
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--gold-border-light);
    }

    .left-logo {
      flex-shrink: 0;
    }

    .left-logo img {
      height: 32px;
      width: auto;
      filter: brightness(0) invert(1);
      display: block;
    }

    .left-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
    }

    .left-rule {
      width: 48px;
      height: 2px;
      background: var(--gold);
      border: none;
      display: block;
    }

    .left-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .left-headline {
      font-size: clamp(36px, 4.5vw, 58px);
      font-weight: 900;
      line-height: 1.0;
      color: var(--white);
    }

    .left-headline em {
      display: block;
      color: var(--gold);
      font-style: italic;
      font-weight: 800;
    }

    .left-sub {
      font-size: 15px;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.6;
    }

    .left-divider {
      width: 100%;
      height: 1px;
      background: rgba(205,0,77,0.15);
      border: none;
    }

    .benefit-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .benefit-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .benefit-icon {
      font-size: 20px !important;
      color: var(--gold);
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }

    .benefit-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
    }

    .ssl-badge {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .ssl-badge .material-icons-outlined {
      font-size: 14px !important;
      color: var(--gold);
    }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1;
      background: var(--right-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
    }

    .right-inner {
      max-width: 460px;
      width: 100%;
      margin: 0 auto;
      padding: 60px 40px;
    }

    /* ── STEP COMMON ───────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step-pane {
      animation: fadeUp 0.3s ease both;
    }

    .progress-track {
      height: 3px;
      background: rgba(205,0,77,0.12);
      border-radius: 2px;
      margin-bottom: 36px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
    }

    .step-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .step-headline {
      font-size: 26px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 6px;
    }

    .step-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── AMOUNT CARD ───────────────────────────── */
    .amount-card {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--gold-border);
      padding: 28px 24px 22px;
      text-align: center;
      margin-bottom: 24px;
    }

    .amount-value {
      font-size: 64px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .amount-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── SLIDER ────────────────────────────────── */
    .slider-wrap {
      margin-bottom: 8px;
    }

    input[type="range"] {
      accent-color: var(--gold);
      width: 100%;
      height: 6px;
      cursor: pointer;
      display: block;
    }

    .slider-markers {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      margin-bottom: 20px;
    }

    .slider-markers span {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }

    /* ── PRESETS ───────────────────────────────── */
    .preset-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 28px;
    }

    .preset-btn {
      background: var(--card-bg);
      border: 1.5px solid var(--border-dark);
      color: var(--white);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      padding: 10px 0;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .preset-btn:hover {
      border-color: var(--gold-border);
    }

    .preset-btn.selected {
      border-color: var(--gold);
      background: var(--gold-tint);
      color: var(--gold);
    }

    /* ── CONTINUE BUTTON ───────────────────────── */
    .btn-continue {
      width: 100%;
      padding: 17px;
      background: var(--gold);
      color: #000;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 16px;
    }

    .btn-continue:hover {
      background: var(--gold-dark);
    }

    .btn-continue:active {
      transform: scale(0.99);
    }

    .step-note {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 20px;
      font-weight: 500;
    }

    /* ── EWA BLURB ─────────────────────────────── */
    .ewa-blurb {
      border-top: 1px solid var(--border-dark);
      padding-top: 18px;
      margin-top: 4px;
    }

    .ewa-blurb p {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
      font-weight: 400;
    }

    /* ── FLOATING LABEL FIELDS ─────────────────── */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .field-wrap input,
    .field-wrap select {
      width: 100%;
      padding: 22px 14px 8px;
      background: var(--card-bg);
      border: 1.5px solid var(--border-dark);
      color: var(--white);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 500;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }

    .field-wrap input:focus,
    .field-wrap select:focus {
      border-color: var(--gold);
    }

    .field-wrap label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 14px;
      font-family: var(--font);
      font-weight: 500;
      transition: top 0.15s, transform 0.15s, font-size 0.15s, color 0.15s, font-weight 0.15s;
    }

    .field-wrap input:not(:placeholder-shown) + label,
    .field-wrap input:focus + label,
    .field-wrap select.has-value + label {
      top: 10px;
      transform: none;
      font-size: 10px;
      color: var(--gold);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-wrap input::placeholder {
      color: transparent;
    }

    /* select arrow */
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }

    .field-error {
      font-size: 11px;
      color: #f87171;
      margin-top: 4px;
      margin-left: 2px;
      font-weight: 600;
    }

    /* ── LEGAL TEXT ────────────────────────────── */
    .legal-text {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
      margin-bottom: 20px;
    }

    /* ── BACK LINK ─────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      padding: 0;
      margin-bottom: 28px;
      transition: color 0.15s;
    }

    .back-link:hover {
      color: var(--gold);
    }

    .back-link .material-icons-outlined {
      font-size: 16px !important;
    }

    /* ── PROCESSING SCREEN ─────────────────────── */
    .processing-screen {
      position: fixed;
      inset: 0;
      background: #09090b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .spin-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--border-dark);
      border-top-color: var(--gold);
      animation: spinRing 0.8s linear infinite;
      margin-bottom: 32px;
    }

    .processing-msg {
      font-size: 15px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.04em;
      transition: opacity 0.4s;
      text-align: center;
      max-width: 280px;
    }

    @keyframes checkPop {
      0%   { transform: scale(0.4); opacity: 0; }
      70%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--gold-tint);
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      animation: checkPop 0.5s ease both;
    }

    .check-circle .material-icons-outlined {
      font-size: 36px !important;
      color: var(--gold);
    }

    .processing-done {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 8px;
      text-align: center;
    }

    .processing-done-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    /* ── MOBILE ────────────────────────────────── */
    @media (max-width: 639px) {
      .app-shell {
        flex-direction: column;
        min-height: 100vh;
      }

      .left-panel {
        position: static;
        height: auto;
        flex: none;
        padding: 28px 24px 24px;
        border-right: none;
        border-bottom: 1px solid var(--gold-border-light);
      }

      .left-main {
        gap: 20px;
        margin-top: 20px;
      }

      .left-headline {
        font-size: 30px;
      }

      .benefit-list {
        display: none;
      }

      .left-divider {
        display: none;
      }

      .ssl-badge {
        display: none;
      }

      .right-panel {
        min-height: auto;
        justify-content: flex-start;
      }

      .right-inner {
        padding: 32px 20px 40px;
      }

      .amount-value {
        font-size: 48px;
      }

      .preset-row {
        gap: 6px;
      }

      .field-row {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const US_STATES = [
      'AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA',
      'HI','ID','IL','IN','IA','KS','KY','LA','ME','MD',
      'MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ',
      'NM','NY','NC','ND','OH','OK','OR','PA','RI','SC',
      'SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'
    ];

    const PRESETS = [250, 500, 1000, 2000];

    const PROCESSING_MESSAGES = [
      'Verifying your employer…',
      'Calculating available wages…',
      'Connecting your bank…',
      'Securing your transfer…',
      'Almost there…',
    ];

    const EWA_BLURB = () => (
      <div className="ewa-blurb">
        <p>
          Early Wage Access is not a loan. You're accessing wages you've already earned but haven't been paid yet.
          No interest, no hidden fees. Repayment happens automatically on your next payday.
          Available amounts depend on hours worked and employer participation.
        </p>
      </div>
    );

    function Step1({ amount, setAmount, onContinue }) {
      return (
        <div className="step-pane" key="step1">
          <div className="step-eyebrow">Select Your Amount</div>
          <div className="step-headline">How much do you need?</div>
          <div className="step-sub">Drag to select your amount</div>

          <div className="amount-card">
            <div className="amount-value">${amount.toLocaleString('en-US')}</div>
            <div className="amount-label">selected</div>
          </div>

          <div className="slider-wrap">
            <input
              type="range"
              min={100}
              max={2000}
              step={50}
              value={amount}
              onChange={e => setAmount(Number(e.target.value))}
            />
            <div className="slider-markers">
              <span>$100</span>
              <span>$2,000</span>
            </div>
          </div>

          <div className="preset-row">
            {PRESETS.map(p => (
              <button
                key={p}
                className={`preset-btn${amount === p ? ' selected' : ''}`}
                onClick={() => setAmount(p)}
              >
                ${p.toLocaleString('en-US')}
              </button>
            ))}
          </div>

          <button className="btn-continue" onClick={onContinue}>
            Continue →
          </button>

          <div className="step-note">Not a loan. Accessing wages you've already earned.</div>

          <EWA_BLURB />
        </div>
      );
    }

    function Step2({ amount, onBack, onSubmit }) {
      const [form, setForm] = useState({
        firstName: 'Jason',
        lastName: 'Williams',
        email: 'jason@epcvip.com',
        age: '',
        state: '',
      });
      const [errors, setErrors] = useState({});

      function set(field, val) {
        setForm(f => ({ ...f, [field]: val }));
        if (errors[field]) setErrors(e => ({ ...e, [field]: '' }));
      }

      function validate() {
        const e = {};
        if (!form.firstName.trim()) e.firstName = 'Required';
        if (!form.lastName.trim()) e.lastName = 'Required';
        if (!form.email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email';
        const age = parseInt(form.age, 10);
        if (!form.age || isNaN(age) || age < 18 || age > 99) e.age = 'Must be 18–99';
        if (!form.state) e.state = 'Required';
        return e;
      }

      function handleSubmit() {
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        onSubmit(form);
      }

      const selectHasValue = form.state !== '';

      return (
        <div className="step-pane" key="step2">
          <button className="back-link" onClick={onBack}>
            <span className="material-icons-outlined">arrow_back</span>
            Back
          </button>

          <div className="step-eyebrow">Your Details</div>
          <div className="step-headline">Your information</div>
          <div className="step-sub">Requesting <strong style={{color:'var(--gold)'}}>${amount.toLocaleString('en-US')}</strong> today</div>

          <div className="field-row">
            <div>
              <div className="field-wrap">
                <input
                  type="text"
                  id="firstName"
                  placeholder="First name"
                  value={form.firstName}
                  onChange={e => set('firstName', e.target.value)}
                />
                <label htmlFor="firstName">First Name</label>
              </div>
              {errors.firstName && <div className="field-error">{errors.firstName}</div>}
            </div>
            <div>
              <div className="field-wrap">
                <input
                  type="text"
                  id="lastName"
                  placeholder="Last name"
                  value={form.lastName}
                  onChange={e => set('lastName', e.target.value)}
                />
                <label htmlFor="lastName">Last Name</label>
              </div>
              {errors.lastName && <div className="field-error">{errors.lastName}</div>}
            </div>
          </div>

          <div className="field-wrap">
            <input
              type="email"
              id="email"
              placeholder="Email"
              value={form.email}
              onChange={e => set('email', e.target.value)}
            />
            <label htmlFor="email">Email Address</label>
          </div>
          {errors.email && <div className="field-error">{errors.email}</div>}

          <div className="field-row">
            <div>
              <div className="field-wrap">
                <input
                  type="text"
                  inputMode="numeric"
                  maxLength={2}
                  id="age"
                  placeholder="Age"
                  value={form.age}
                  onChange={e => set('age', e.target.value)}
                />
                <label htmlFor="age">Age</label>
              </div>
              {errors.age && <div className="field-error">{errors.age}</div>}
            </div>
            <div>
              <div className={`field-wrap select-wrap`}>
                <select
                  id="state"
                  className={selectHasValue ? 'has-value' : ''}
                  value={form.state}
                  onChange={e => set('state', e.target.value)}
                >
                  <option value="" disabled></option>
                  {US_STATES.map(s => (
                    <option key={s} value={s}>{s}</option>
                  ))}
                </select>
                <label htmlFor="state">State</label>
              </div>
              {errors.state && <div className="field-error">{errors.state}</div>}
            </div>
          </div>

          <button className="btn-continue" onClick={handleSubmit} style={{marginTop: '8px'}}>
            Get My Money →
          </button>

          <div className="legal-text">
            By continuing you agree to our Terms of Service and Privacy Policy. You authorize us to verify your
            employment and bank account. Message &amp; data rates may apply.
          </div>

          <EWA_BLURB />
        </div>
      );
    }

    function ProcessingScreen() {
      const [msgIndex, setMsgIndex] = useState(0);
      const [done, setDone] = useState(false);

      useEffect(() => {
        const interval = setInterval(() => {
          setMsgIndex(i => {
            if (i >= PROCESSING_MESSAGES.length - 1) {
              clearInterval(interval);
              setTimeout(() => setDone(true), 600);
              return i;
            }
            return i + 1;
          });
        }, 900);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="processing-screen">
          {done ? (
            <>
              <div className="check-circle">
                <span className="material-icons-outlined">check</span>
              </div>
              <div className="processing-done">You're approved.</div>
              <div className="processing-done-sub">Redirecting to your offer…</div>
            </>
          ) : (
            <>
              <div className="spin-ring"></div>
              <div className="processing-msg">{PROCESSING_MESSAGES[msgIndex]}</div>
            </>
          )}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(1);
      const [amount, setAmount] = useState(500);
      const [processing, setProcessing] = useState(false);

      function handleStep1Continue() {
        setStep(2);
        window.scrollTo({ top: 0 });
      }

      function handleSubmit(form) {
        setProcessing(true);
      }

      if (processing) {
        return <ProcessingScreen />;
      }

      return (
        <div className="app-shell">
          {/* LEFT PANEL */}
          <aside className="left-panel">
            <div className="left-logo">
              <img src="../media/logo.svg" alt="Logo" />
            </div>

            <div className="left-main">
              <hr className="left-rule" />

              <div className="left-eyebrow">Early Wage Access</div>

              <h1 className="left-headline">
                Stop waiting for payday. <em>Get paid today.</em>
              </h1>

              <p className="left-sub">
                Access wages you've already earned — before your scheduled payday.
              </p>

              <hr className="left-divider" />

              <div className="benefit-list">
                <div className="benefit-row">
                  <span className="material-icons-outlined benefit-icon">payments</span>
                  <span className="benefit-text">Up to $2,000 same day</span>
                </div>
                <div className="benefit-row">
                  <span className="material-icons-outlined benefit-icon">verified_user</span>
                  <span className="benefit-text">No credit check required</span>
                </div>
                <div className="benefit-row">
                  <span className="material-icons-outlined benefit-icon">bolt</span>
                  <span className="benefit-text">Instant bank transfer</span>
                </div>
                <div className="benefit-row">
                  <span className="material-icons-outlined benefit-icon">lock</span>
                  <span className="benefit-text">Zero interest, zero fees</span>
                </div>
              </div>
            </div>

            <div className="ssl-badge">
              <span className="material-icons-outlined">lock</span>
              SSL Encrypted &amp; Secure
            </div>
          </aside>

          {/* RIGHT PANEL */}
          <main className="right-panel">
            <div className="right-inner">
              <div className="progress-track" role="progressbar" aria-valuenow={step === 1 ? 50 : 100} aria-valuemin={0} aria-valuemax={100} aria-label={`Step ${step} of 2`}>
                <div className="progress-fill" style={{width: step === 1 ? '50%' : '100%'}} />
              </div>
              {step === 1 ? (
                <Step1
                  amount={amount}
                  setAmount={setAmount}
                  onContinue={handleStep1Continue}
                />
              ) : (
                <Step2
                  amount={amount}
                  onBack={() => setStep(1)}
                  onSubmit={handleSubmit}
                />
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
