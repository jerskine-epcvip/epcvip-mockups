      --accent:      #4a9c3f;

    body {

      background: #ffffff;
      color: var(--text);

      flex-direction: column;

    #root { display: flex; flex-direction: column; flex: 1; align-items: stretch; min-height: 100vh; }

    /* ========================
       FLOW WRAPPER
    ======================== */

      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      align-self: center;
      flex: 1;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;

    /* ========================
       SITE HEADER
    ======================== */
    .site-header {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 14px 20px;

      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      width: 100%;

    /* ========================
       PROGRESS BAR
    ======================== */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e0e0e0;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--brand-green);
      transition: width 0.5s ease;
    }

    /* ========================
       SCREEN BASE
    ======================== */
    .screen {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 24px 20px 32px;
      animation: fadeSlideUp 0.35s ease both;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen-fade-out {
      animation: fadeScaleOut 0.25s ease forwards;
    }
    @keyframes fadeScaleOut {
      to { opacity: 0; transform: scale(0.97) translateY(-8px); }
    }
    #screen1-wrap { padding-top: 0; }

    /* ========================
       POLYGON WIPE OVERLAY
    ======================== */
    .page-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      background: var(--accent);
      clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
    }
    @keyframes wipeIn {
      from { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
      to   { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    }
    @keyframes wipeOut {
      from { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
      to   { clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%); }
    }
    .overlay-wipe-in  { animation: wipeIn  0.38s cubic-bezier(0.4,0,0.2,1) forwards; }

      font-family: var(--font); white-space: nowrap; line-height: 1;

      top: 11px; transform: translateY(0);

      letter-spacing: 0.04em; text-transform: uppercase;

    .float-field.has-select select:focus + label { color: var(--accent); }
    .float-field.has-select select.error + label { color: #ef4444; }
    .float-field.has-select::after {
      content: '▾'; position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%); color: var(--accent);
      pointer-events: none; font-size: 13px;

    .btn-accent {
      width: 100%; padding: 18px 24px; min-height: 56px;

      text-transform: uppercase; letter-spacing: 0.03em;

    .btn-accent:hover { background: var(--accent-dark); box-shadow: 0 8px 32px rgba(74,156,63,0.4); }

/* ========================
   SCREEN 2
======================== */
function Screen2({ onSubmit }) {
  const [form, setForm] = useState({ firstName: 'Jason', lastName: 'Williams', email: 'jason@example.com', age: '', state: '' });
  const [errors, setErrors] = useState({});

  function set(field, val) { setForm(f => ({ ...f, [field]: val })); }

  function validate() {
    const e = {};
    if (!form.firstName.trim()) e.firstName = true;
    if (!form.lastName.trim())  e.lastName  = true;
    if (!form.email.trim() || !form.email.includes('@')) e.email = true;
    const age = parseInt(form.age, 10);
    if (!form.age || age < 18 || age > 99) e.age = true;
    if (!form.state) e.state = true;
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  function handleSubmit() {
    if (validate()) onSubmit();
  }

  return (
    <div className="screen">
      <div className="s2-inner">
        {[...Array(7)].map((_, i) => <div key={i} className="deco-dot" />)}

        <div className="s2-badge">⚡ Early Wage Access</div>

        <div className="s2-headline-wrap">
          <h2 className="s2-headline">Your bank <span className="underline-word">won't</span> help. We will.</h2>
        </div>

        <p className="s2-sub">Access your earned wages in minutes. No bank account needed.</p>

        <div className="s2-form-card">
          <div className="float-group">
            <div className="float-field">
              <input type="text" placeholder=" " value={form.firstName} onChange={e => set('firstName', e.target.value)} className={errors.firstName ? 'error' : ''} id="v3-firstName" autoComplete="given-name" />
              <label htmlFor="v3-firstName">First Name</label>
            </div>
            <div className="float-field">
              <input type="text" placeholder=" " value={form.lastName} onChange={e => set('lastName', e.target.value)} className={errors.lastName ? 'error' : ''} id="v3-lastName" autoComplete="family-name" />
              <label htmlFor="v3-lastName">Last Name</label>
            </div>
          </div>

          <div className="float-group full">
            <div className="float-field">
              <input type="email" placeholder=" " value={form.email} onChange={e => set('email', e.target.value)} className={errors.email ? 'error' : ''} id="v3-email" autoComplete="email" />
              <label htmlFor="v3-email">Email Address</label>
            </div>
          </div>

          <div className="float-group">
            <div className="float-field">
              <input
                type="text"
                inputMode="numeric"
                pattern="[0-9]*"
                placeholder=" "
                value={form.age}
                onChange={e => set('age', e.target.value.replace(/\D/g, ''))}
                className={errors.age ? 'error' : ''}
                id="v3-age"
                autoComplete="off"
              />
              <label htmlFor="v3-age">Age</label>
            </div>
            <div className="float-field has-select">
              <select value={form.state} onChange={e => set('state', e.target.value)} className={errors.state ? 'error' : ''} id="v3-state">
                <option value="">Select state</option>
                {US_STATES.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
              <label htmlFor="v3-state">State</label>
            </div>
          </div>
        </div>

        <button className="btn-accent" onClick={handleSubmit}>
          Show Me EWA Offers
          <span className="arrow-icon">→</span>
        </button>

        <div className="legal-divider" />
        <div className="legal-text">
          <p><strong>What is Early Wage Access?</strong><br/>
          EWA services let you access earned wages before payday. Unlike traditional financial products, advances are based on hours already worked — not your credit score. Most services charge a small optional tip or subscription fee.</p>
          <p>By clicking "Show Me EWA Offers," you may be matched with third-party EWA providers. EPCVIP does not guarantee approval, funding amounts, or terms. Availability may vary by state.</p>
        </div>
      </div>
    </div>
  );
}

/* ========================
   SCREEN 3
======================== */
function Screen3({ onDone }) {
  const [counterVal, setCounterVal] = useState(0);
  const [ringDone, setRingDone]     = useState(false);
  const [msg, setMsg]               = useState(PROCESSING_MSGS[0]);
  const [msgPop, setMsgPop]         = useState(false);
  const [sparks, setSparks]         = useState([]);
  const rafRef   = useRef(null);
  const startRef = useRef(null);
  const timerRefs = useRef([]);

  useEffect(() => {
    const TARGET = 1500, DURATION = 2200;
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function tick(ts) {
      if (!startRef.current) startRef.current = ts;
      const elapsed  = ts - startRef.current;
      const progress = Math.min(elapsed / DURATION, 1);
      setCounterVal(Math.round(easeOutCubic(progress) * TARGET));
      if (progress < 1) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        setRingDone(true);
        // Spark burst
        const angles = [0, 45, 90, 135, 180, 225, 270, 315];
        const dist = 75;
        setSparks(angles.map((a, i) => {
          const rad = (a * Math.PI) / 180;
          return { id: i, dx: Math.round(Math.cos(rad) * dist), dy: Math.round(Math.sin(rad) * dist), delay: i * 40 };
        }));
      }
    }
    rafRef.current = requestAnimationFrame(tick);

    // Status messages
    const msgSchedule = [
      { text: PROCESSING_MSGS[0], delay: 0,    pop: false },
      { text: PROCESSING_MSGS[1], delay: 800,  pop: false },
      { text: PROCESSING_MSGS[2], delay: 1600, pop: false },
      { text: PROCESSING_MSGS[3], delay: 2300, pop: true  }
    ];
    msgSchedule.forEach(m => {
      const t = setTimeout(() => {
        if (m.pop) {
          setMsg(''); setMsgPop(false);
          setTimeout(() => { setMsg(m.text); setMsgPop(true); }, 50);
        } else {
          setMsg(m.text); setMsgPop(false);
        }
      }, m.delay);
      timerRefs.current.push(t);
    });

    // Advance to Screen 4
    const doneTimer = setTimeout(() => onDone(), 2800);
    timerRefs.current.push(doneTimer);

    return () => {
      cancelAnimationFrame(rafRef.current);
      timerRefs.current.forEach(clearTimeout);
    };
  }, []);

  return (
    <div className="screen">
      <div className="s3-wrap">
        <div className="ring-container">
          <div className={`ring-spinner${ringDone ? ' done' : ''}`} />

          <div className="sparks-container">
            {sparks.map(s => (
              <div
                key={s.id}
                className="spark burst"
                style={{ '--dx': `${s.dx}px`, '--dy': `${s.dy}px`, animationDelay: `${s.delay}ms` }}
              />
            ))}
          </div>

          <div className="counter-wrap">
            <div className="counter-amount">
              <span className="dollar-sign">$</span>
              <span>{counterVal.toLocaleString()}</span>
            </div>
            <div className="counter-sub">in potential advances</div>
          </div>
        </div>

        <div className={`s3-msg${msgPop ? ' pop' : ''}`}>{msg}</div>
      </div>
    </div>
  );
}

/* ========================
   SCREEN 4
======================== */
function Screen4() {
  const [amounts, setAmounts]       = useState(() => Object.fromEntries(EWA_OFFERS.map(o => [o.id, o.maxAmt])));
  const [visibleCards, setVisible]  = useState([]);
  const [offerCount, setOfferCount] = useState(0);

  useEffect(() => {
    // Staggered card entrance
    EWA_OFFERS.forEach((o, i) => {
      setTimeout(() => setVisible(v => [...v, o.id]), 100 + i * 140);
    });
    // Count-up offer number 0→3
    [0, 1, 2, 3].forEach((n, i) => setTimeout(() => setOfferCount(n), i * 200));
  }, []);

  return (
    <div className="screen">
      <div className="s4-header">
        <h2 className="s4-headline">Your instant cash options</h2>
        <p className="s4-sub"><span className="count-num">{offerCount}</span> offers matched to your profile</p>
      </div>

      <div className="offers-list">
        {EWA_OFFERS.map(o => (
          <div
            key={o.id}
            className={`offer-card${o.badge ? ' best-match' : ''}${visibleCards.includes(o.id) ? ' visible' : ''}`}
            style={{ '--bclr': o.bclr, '--bclr2': o.bclr2, '--btext': o.btext, '--cclr': o.cclr, '--ctext': o.ctext }}
          >
            <div className="offer-header">
              {o.badge && <div className="offer-ribbon">{o.badge}</div>}
              <img src={o.logo} alt={o.name} className="offer-logo" style={{ filter: o.logoFilter }} />
              <div className="offer-tagline">{o.tagline}</div>
              <div className="offer-big-amt">${o.maxAmt}</div>
              <div className="offer-delivery">
                <span className="material-icons-outlined" aria-hidden="true">bolt</span>
                {o.delivery}
              </div>
            </div>
            <div className="offer-body">
              <div className="offer-select-label">Select amount</div>
              <div className="offer-amts-grid">
                {o.amounts.map(amt => (
                  <button
                    key={amt}
                    className={`amt-btn${amounts[o.id] === amt ? ' selected' : ''}`}
                    onClick={() => setAmounts(a => ({ ...a, [o.id]: amt }))}
                  >
                    ${amt}
                  </button>
                ))}
              </div>
              <a href={o.url} className="offer-cta">
                {o.ctaBase} ${amounts[o.id]} →
              </a>
              <div className="offer-trust-line">{o.trust}</div>
            </div>
          </div>
        ))}
      </div>

      <div className="s4-trust">
        🔒 256-bit SSL · 3 verified offers matched to you
      </div>
    </div>
  );
}

/* ========================
   APP ROOT
======================== */
function App() {
  const [screen, setScreen]         = useState(1);
  const [overlayPhase, setOverlay]  = useState('none'); // none | wipe-in | wipe-out
  const [progressPct, setProgress]  = useState(75);
  const [showProgress, setShowProg] = useState(true);

  // Polygon wipe transition (Screen 1 → 2)
  function doWipeTransition() {
    setOverlay('wipe-in');
    setTimeout(() => {
      setScreen(2);
      setShowProg(false);
      setOverlay('wipe-out');
      setTimeout(() => setOverlay('none'), 400);
    }, 380);
  }

  // Fade transition (Screen 2 → 3 → 4)
  function doFadeTransition(nextScreen) {
    setScreen(nextScreen);
    setShowProg(false);
  }

  function handleS1Continue(mode) {
    if (mode === 'wipe') doWipeTransition();
  }

  function handleS2Submit() {
    doFadeTransition(3);
  }

  function handleS3Done() {
    doFadeTransition(4);
  }

  const overlayClass = overlayPhase === 'wipe-in'  ? 'page-overlay overlay-wipe-in'
                     : overlayPhase === 'wipe-out' ? 'page-overlay overlay-wipe-out'
                     : 'page-overlay';

  return (
    <>
      <div className={overlayClass} />

      <div className="site-header">
        <img src="../media/logo.svg" alt="Fast Loan Advance" />
      </div>

      {showProgress && (
        <div className="progress-bar">
          <div className="progress-fill" style={{ width: `${progressPct}%` }} />
        </div>
      )}

      <div className="flow-wrap">
        {screen === 1 && <Screen1 onContinue={handleS1Continue} />}
        {screen === 2 && <Screen2 onSubmit={handleS2Submit} />}
        {screen === 3 && <Screen3 onDone={handleS3Done} />}
        {screen === 4 && <Screen4 />}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
