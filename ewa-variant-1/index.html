<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Early Wage Access — EWA Variant 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #4a9c3f;
  --green-dark: #3a7a30;
  --green-light: rgba(74,156,63,0.08);
  --green-border: rgba(74,156,63,0.25);
  --dark: #1a1a2e;
  --muted: #6b7280;
  --border: #d4ead1;
  --beige: #f0ede6;
  --white: #ffffff;
  --radius: 10px;
  --font: 'Montserrat', system-ui, sans-serif;
}
html, body { height: 100%; font-family: var(--font); color: var(--dark); -webkit-font-smoothing: antialiased; }
#root { min-height: 100vh; display: flex; flex-direction: column; }

/* ── Split layout ── */
.split-screen {
  display: flex; flex-direction: column; flex: 1;
}
@media (min-width: 640px) {
  .split-screen { flex-direction: row; }
}

/* ── Left panel ── */
.split-left {
  background: var(--beige); padding: 28px 20px; display: flex; flex-direction: column;
}
.left-logo { height: 32px; width: auto; display: block; align-self: flex-start; }
.left-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 18px;
}
@media (min-width: 640px) {
  .left-main { gap: 24px; }
}
@media (min-width: 640px) {
  .split-left {
    flex: 0 0 42%; min-height: 100vh; position: sticky; top: 0;
    padding: 60px 48px; justify-content: center;
  }
}
.left-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--green); text-transform: uppercase;
}
.left-headline {
  font-size: clamp(30px, 4vw, 52px); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; color: var(--dark);
}
.left-headline em { font-style: normal; color: var(--green); }
.left-rule { width: 48px; height: 3px; background: var(--green); border-radius: 2px; flex-shrink: 0; }
.left-bullets { display: flex; flex-direction: column; gap: 12px; }
.left-bullet { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; line-height: 1.4; font-weight: 500; }
.bullet-check { color: var(--green); font-weight: 700; font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.left-blurb { display: none; }
.left-ssl {
  display: none; align-items: center; gap: 6px; font-size: 11px; color: rgba(26,26,46,0.45);
  padding-top: 20px; border-top: 1px solid rgba(26,26,46,0.12);
}
@media (min-width: 640px) { .left-ssl { display: flex; } }
.left-ssl .material-icons-outlined { font-size: 14px; }

/* ── Right panel ── */
.split-right {
  flex: 1; background: var(--white);
  display: flex; flex-direction: column;
}
.right-inner {
  flex: 1; padding: 32px 20px 48px; display: flex; flex-direction: column; gap: 28px;
  max-width: 520px; width: 100%; margin: 0 auto;
}
@media (min-width: 640px) {
  .right-inner { padding: 60px 40px; justify-content: center; align-items: flex-start; }
}

/* ── Step transition ── */
@keyframes stepFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.step-pane { display: flex; flex-direction: column; gap: 20px; animation: stepFadeIn 0.35s cubic-bezier(0.4,0,0.2,1) both; }

/* ── Form eyebrow / headline ── */
.form-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--green); text-transform: uppercase; }
.form-headline { font-size: clamp(22px, 3vw, 28px); font-weight: 700; color: var(--dark); line-height: 1.2; }
.form-sub { font-size: 14px; color: var(--muted); font-weight: 500; }

/* ── Pill amount buttons ── */
.amount-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
@media (max-width: 480px) { .amount-grid { grid-template-columns: repeat(3, 1fr); } }
.amount-pill {
  padding: 12px 6px; border: 2px solid var(--border); border-radius: 100px;
  background: var(--white); color: var(--dark); font-family: var(--font);
  font-size: 14px; font-weight: 700; cursor: pointer; text-align: center;
  transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
}
.amount-pill:hover { border-color: var(--green); }
.amount-pill.selected { background: var(--green); color: var(--white); border-color: var(--green); }
.amount-pill:active { transform: scale(0.97); }
.custom-input-wrap { margin-top: 4px; }
.custom-input {
  width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: var(--radius);
  font-size: 16px; font-family: var(--font); font-weight: 700; color: var(--dark);
  outline: none; transition: border-color 0.15s;
}
.custom-input:focus { border-color: var(--green); }
.custom-input::placeholder { color: #bbb; font-weight: 400; }

/* ── CTA button ── */
.btn-cta {
  width: 100%; min-height: 54px; background: var(--green); color: var(--white);
  border: none; border-radius: var(--radius); font-family: var(--font);
  font-size: 17px; font-weight: 700; cursor: pointer; letter-spacing: 0.01em;
  transition: background 0.15s, transform 0.1s;
}
.btn-cta:hover:not(:disabled) { background: var(--green-dark); }
.btn-cta:active:not(:disabled) { transform: scale(0.99); }
.btn-cta:disabled { background: #ccc; cursor: not-allowed; }
.btn-note { font-size: 11px; color: var(--muted); text-align: center; font-weight: 500; }

/* ── Floating label fields ── */
.fields-group { display: flex; flex-direction: column; gap: 14px; }
.fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 480px) { .fields-row { grid-template-columns: 1fr; } }
.field { position: relative; }
.field input, .field select {
  width: 100%; padding: 22px 14px 8px; font-size: 16px; font-family: var(--font);
  font-weight: 600; color: var(--dark); background: var(--white);
  border: 1.5px solid var(--border); border-radius: var(--radius);
  outline: none; appearance: none; -webkit-appearance: none;
  transition: border-color 0.15s;
}
.field input::placeholder { color: transparent; }
.field input:focus, .field select:focus { border-color: var(--green); }
.field label {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 14px; color: var(--muted); pointer-events: none;
  transition: top 0.15s, font-size 0.15s, color 0.15s, transform 0.15s;
  white-space: nowrap;
}
.field input:not(:placeholder-shown) + label,
.field input:focus + label,
.field select.has-val + label {
  top: 10px; transform: none; font-size: 10px; font-weight: 700;
  color: var(--green); text-transform: uppercase; letter-spacing: 0.05em;
}
.select-arrow {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none; font-size: 12px;
}
.legal-block { display: flex; flex-direction: column; gap: 10px; }
.legal-hr { border: none; border-top: 1px solid var(--border); }
.legal-text { font-size: 11px; color: var(--muted); line-height: 1.55; font-weight: 500; }

/* ── Processing screen ── */
.processing-screen {
  position: fixed; inset: 0; background: var(--white); z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 28px; padding: 40px 20px;
}
.spinner { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.ring { position: absolute; border-radius: 50%; border: 3px solid transparent; }
.ring-1 { inset: 0; border-top-color: var(--green); animation: spin 1.1s linear infinite; }
.ring-2 { inset: 14px; border-right-color: #86c97e; animation: spin 1.7s linear infinite reverse; opacity: 0.75; }
.ring-3 { inset: 28px; border-bottom-color: var(--green); animation: spin 0.85s linear infinite; opacity: 0.5; }
@keyframes spin { to { transform: rotate(360deg); } }
.proc-msg { font-size: 16px; color: var(--muted); font-style: italic; text-align: center; }
.proc-done { display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
.proc-check { font-size: 64px; color: var(--green); font-family: 'Material Icons Outlined'; }
.proc-title { font-size: 24px; font-weight: 800; color: var(--dark); }
.proc-sub { font-size: 14px; color: var(--muted); font-weight: 500; }

@media (prefers-reduced-motion: reduce) {
  .ring, .step-track { animation: none; transition: none; }
}
@media (max-width: 639px) {
  .left-bullets { gap: 6px; }
  .left-bullets li:nth-child(n+3) { display: none; }
}
.mobile-blurb {
  font-size: 13px;
  line-height: 1.6;
  color: #6b7280;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid #e5e7eb;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const AMOUNTS = [100, 250, 500, 750, 1000, 1500, 2000];
const US_STATES = ['Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'];

function AmountStep({ onContinue }) {
  const [selected, setSelected] = useState(null);
  const [customVal, setCustomVal] = useState('');
  const showCustom = selected === 'custom';
  const customNum = parseInt(customVal, 10);
  const canContinue = selected !== null && (selected !== 'custom' || (customNum >= 100 && customNum <= 2000));

  return (
    <div className="step-pane">
      <div>
        <p className="form-eyebrow">Early Wage Access</p>
        <h2 className="form-headline" style={{marginTop:6}}>How much do you need?</h2>
        <p className="form-sub" style={{marginTop:6}}>Select an amount between $100–$2,000</p>
      </div>
      <div className="amount-grid">
        {AMOUNTS.map(a => (
          <button
            key={a}
            className={`amount-pill${selected === a ? ' selected' : ''}`}
            onClick={() => setSelected(a)}
          >${a.toLocaleString('en-US')}</button>
        ))}
        <button
          className={`amount-pill${selected === 'custom' ? ' selected' : ''}`}
          onClick={() => setSelected('custom')}
        >Custom</button>
      </div>
      {showCustom && (
        <div className="custom-input-wrap">
          <input
            className="custom-input"
            type="number"
            min={100}
            max={2000}
            placeholder="Enter amount ($100–$2,000)"
            value={customVal}
            onChange={e => setCustomVal(e.target.value)}
            aria-label="Custom amount"
          />
        </div>
      )}
      <button className="btn-cta" disabled={!canContinue} onClick={onContinue}>Continue →</button>
      <p className="btn-note">Not a loan. You're accessing wages already earned.</p>
      <div className="mobile-blurb">Early Wage Access, or EWA, lets employees access a portion of the wages they've already earned before their scheduled payday. It can provide added flexibility for covering everyday expenses, bills, or unexpected costs without waiting for the next paycheck.</div>
    </div>
  );
}

function FormStep({ onContinue }) {
  const [form, setForm] = useState({ firstName:'Jason', lastName:'Williams', email:'jason@epcvip.com', age:'', state:'' });
  const set = (k,v) => setForm(f => ({...f, [k]: v}));
  const valid = form.firstName.trim() && form.lastName.trim()
    && /\S+@\S+\.\S+/.test(form.email)
    && parseInt(form.age,10) >= 18 && parseInt(form.age,10) <= 99
    && form.state;

  return (
    <div className="step-pane">
      <div>
        <p className="form-eyebrow">Early Wage Access</p>
        <h2 className="form-headline" style={{marginTop:6}}>Tell us about yourself</h2>
      </div>
      <div className="fields-group">
        <div className="fields-row">
          <div className="field">
            <input type="text" id="fn" value={form.firstName} placeholder="x" onChange={e=>set('firstName',e.target.value)} />
            <label htmlFor="fn">First Name</label>
          </div>
          <div className="field">
            <input type="text" id="ln" value={form.lastName} placeholder="x" onChange={e=>set('lastName',e.target.value)} />
            <label htmlFor="ln">Last Name</label>
          </div>
        </div>
        <div className="field">
          <input type="email" id="em" value={form.email} placeholder="x" onChange={e=>set('email',e.target.value)} />
          <label htmlFor="em">Email Address</label>
        </div>
        <div className="field">
          <input type="number" id="age" value={form.age} placeholder="x" onChange={e=>set('age',e.target.value)} min={18} max={99} />
          <label htmlFor="age">Age</label>
        </div>
        <div className="field">
          <div style={{position:'relative'}}>
            <select
              id="state"
              className={form.state ? 'has-val' : ''}
              value={form.state}
              onChange={e=>set('state',e.target.value)}
            >
              <option value=""> </option>
              {US_STATES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <label htmlFor="state">State</label>
            <span className="select-arrow">▾</span>
          </div>
        </div>
      </div>
      <button className="btn-cta" disabled={!valid} onClick={onContinue}>Continue →</button>
      <div className="legal-block">
        <hr className="legal-hr" />
        <p className="legal-text">By clicking "Continue," you agree to our Terms of Service and Privacy Policy and consent to be contacted regarding your earned wage access options. This is not a loan application.</p>
        <p className="legal-text">Earned wage access products are not loans. You are accessing wages you have already earned. No interest is charged. Repayment is automatic on your next payday.</p>
      </div>
      <div className="mobile-blurb">Early Wage Access, or EWA, lets employees access a portion of the wages they've already earned before their scheduled payday. It can provide added flexibility for covering everyday expenses, bills, or unexpected costs without waiting for the next paycheck.</div>
    </div>
  );
}

function ProcessingScreen() {
  const MSGS = ['Verifying your information…','Matching EWA providers…','Almost there…'];
  const [msgIdx, setMsgIdx] = useState(0);
  const [done, setDone] = useState(false);

  useEffect(() => {
    const timers = [
      setTimeout(() => setMsgIdx(1), 1200),
      setTimeout(() => setMsgIdx(2), 2400),
      setTimeout(() => setDone(true), 3500),
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div className="processing-screen" role="status" aria-live="polite">
      {!done ? (
        <>
          <div className="spinner" aria-hidden="true">
            <div className="ring ring-1" />
            <div className="ring ring-2" />
            <div className="ring ring-3" />
          </div>
          <p className="proc-msg">{MSGS[msgIdx]}</p>
        </>
      ) : (
        <div className="proc-done">
          <span className="proc-check" aria-hidden="true">check_circle</span>
          <p className="proc-title">User Redirected</p>
          <p className="proc-sub">You're being connected to your EWA options.</p>
        </div>
      )}
    </div>
  );
}

function App() {
  const [step, setStep] = useState(1);
  const [processing, setProcessing] = useState(false);

  const goStep2 = () => setStep(2);
  const goProcessing = () => setProcessing(true);

  return (
    <div id="root-app" style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {processing && <ProcessingScreen />}
      <div className="split-screen">
        <aside className="split-left">
          <div className="left-main">
            <img src="../media/logo.svg" alt="Fast Loan Advance" className="left-logo" onError={e => e.currentTarget.style.display='none'} />
            <p className="left-eyebrow">Early Wage Access</p>
            <h1 className="left-headline">Get your wages sooner, right when you <em>need them!</em></h1>
            <div className="left-rule" />
            <ul className="left-bullets" style={{listStyle:'none'}}>
              {['Get up to $2,000 before payday','No credit check required','Access wages you\'ve already earned','No interest, no hidden fees'].map(b => (
                <li key={b} className="left-bullet">
                  <span className="bullet-check">✓</span>
                  <span>{b}</span>
                </li>
              ))}
            </ul>
            <p className="left-blurb">Early Wage Access, or EWA, lets employees access a portion of the wages they've already earned before their scheduled payday. It can provide added flexibility for covering everyday expenses, bills, or unexpected costs without waiting for the next paycheck.</p>
          </div>
          <div className="left-ssl">
            <span className="material-icons-outlined">lock</span>
            <span>256-bit SSL encrypted · Never sold</span>
          </div>
        </aside>
        <main className="split-right">
          <div className="right-inner">
            {step === 1 && <AmountStep key="step1" onContinue={goStep2} />}
            {step === 2 && <FormStep key="step2" onContinue={goProcessing} />}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
