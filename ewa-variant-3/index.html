<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Get Paid Today | Early Wage Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ========================
   TOKENS
======================== */
:root {
  --green:        #4a9c3f;
  --green-dark:   #3a7a30;
  --green-light:  #d4ead1;
  --green-border: #86c97e;
  --dark:         #1a1a2e;
  --muted:        #6b7280;
  --border:       #d4ead1;
  --beige:        #f0ede6;
  --white:        #ffffff;
  --font:         'Montserrat', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  font-family: var(--font);
  color: var(--dark);
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}

/* ========================
   LAYOUT — SPLIT SCREEN
======================== */
.split-wrap {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* LEFT PANEL */
.panel-left {
  background: var(--beige);
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
}

/* RIGHT PANEL */
.panel-right {
  background: var(--white);
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Desktop: side by side */
@media (min-width: 640px) {
  .split-wrap {
    flex-direction: row;
    min-height: 100vh;
  }
  .panel-left {
    flex: 0 0 42%;
    position: sticky;
    top: 0;
    height: 100vh;
    padding: 60px 48px 64px;
    gap: 24px;
    justify-content: flex-start;
  }
  .panel-right {
    flex: 1;
    overflow-y: auto;
    justify-content: center;
  }
  .left-verbose {
    flex: 1;
    justify-content: center;
  }
}

/* ========================
   LEFT PANEL CONTENT
======================== */
.left-logo {
  height: 34px;
  width: auto;
  margin-bottom: 8px;
  object-fit: contain;
  object-position: left center;
}

.left-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--green);
}

.left-headline {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 800;
  line-height: 1.05;
  color: var(--dark);
  letter-spacing: -0.02em;
}

.left-headline .accent { color: var(--green); }

.left-rule {
  width: 48px;
  height: 3px;
  background: var(--green);
  border-radius: 2px;
  flex-shrink: 0;
}

.left-bullets {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.left-bullets li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--dark);
}

.left-bullets li::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}

.left-blurb {
  font-size: 13px;
  line-height: 1.6;
  color: var(--muted);
  font-weight: 400;
}

.left-ssl {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
}

.left-ssl .material-icons-outlined {
  font-size: 16px;
  color: var(--green);
}

/* Hide verbose left content on mobile — show compact version */
.left-verbose { display: none; }
.left-compact { display: flex; flex-direction: column; gap: 16px; }

@media (max-width: 639px) {
  .left-headline br { display: none; }
  .left-bullets { gap: 6px; }
  .compact-bullets li:nth-child(n+3) { display: none; }
}

@media (min-width: 640px) {
  .left-verbose { display: flex; flex-direction: column; gap: 20px; }
  .left-compact { display: none; }
}

.compact-headline {
  font-size: 26px;
  font-weight: 800;
  line-height: 1.1;
  color: var(--dark);
  letter-spacing: -0.02em;
}
.compact-headline .accent { color: var(--green); }

.compact-bullets {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.compact-bullets li {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--dark);
}

.compact-bullets li::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}

/* ========================
   RIGHT PANEL INNER
======================== */
.right-inner {
  display: flex;
  flex-direction: column;
  padding: 32px 24px 40px;
  max-width: 500px;
  width: 100%;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

@media (min-width: 640px) {
  .right-inner {
    padding: 60px 48px 64px;
  }
}

/* ========================
   STEP MANAGEMENT & ANIMATIONS
======================== */
.step-container {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.step {
  display: flex;
  flex-direction: column;
  flex: 1;
  gap: 0;
}

.step.hidden { display: none; }

@keyframes slideUpOut {
  to { opacity: 0; transform: translateY(-40px); }
}
@keyframes slideUpIn {
  from { opacity: 0; transform: translateY(60px); }
  to   { opacity: 1; transform: translateY(0); }
}

.step-exit {
  animation: slideUpOut 0.3s ease-in forwards;
}
.step-enter {
  animation: slideUpIn 0.35s cubic-bezier(0.34, 1.1, 0.64, 1) forwards;
}

/* ========================
   STEP EYEBROW / HEADER
======================== */
.step-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 8px;
}

.step-headline {
  font-size: 22px;
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.02em;
  margin-bottom: 4px;
  line-height: 1.2;
}

.step-sub {
  font-size: 13px;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 28px;
}

/* ========================
   AMOUNT DISPLAY
======================== */
.amount-display {
  text-align: center;
  margin-bottom: 24px;
}

.amount-value {
  font-size: 56px;
  font-weight: 800;
  color: var(--green);
  letter-spacing: -0.03em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.amount-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  margin-top: 6px;
  letter-spacing: 0.03em;
}

/* ========================
   RANGE SLIDER
======================== */
.slider-wrap {
  padding: 4px 0 16px;
}

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  outline: none;
  cursor: pointer;
  background: linear-gradient(to right, #4a9c3f 21.05%, #d4ead1 21.05%);
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #4a9c3f;
  border: 3px solid white;
  box-shadow: 0 2px 8px rgba(74,156,63,0.4);
  cursor: pointer;
}

input[type=range]::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #4a9c3f;
  border: 3px solid white;
  box-shadow: 0 2px 8px rgba(74,156,63,0.4);
  cursor: pointer;
}

.slider-minmax {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.slider-minmax span {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

/* ========================
   QUICK PRESETS
======================== */
.presets-row {
  display: flex;
  gap: 8px;
  margin-top: 20px;
  margin-bottom: 28px;
}

.preset-btn {
  flex: 1;
  padding: 8px 0;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--white);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  color: var(--dark);
  cursor: pointer;
  transition: all 0.15s ease;
}

.preset-btn:hover {
  border-color: var(--green);
  color: var(--green);
  background: rgba(74,156,63,0.04);
}

.preset-btn.active {
  border-color: var(--green);
  background: var(--green);
  color: var(--white);
}

/* ========================
   FLOATING LABEL FIELDS
======================== */
.fields-stack {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 4px;
}

.field-group {
  position: relative;
}

.field-group input,
.field-group select {
  width: 100%;
  padding: 20px 16px 8px;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  color: var(--dark);
  background: var(--white);
  outline: none;
  transition: border-color 0.15s ease;
  appearance: none;
  -webkit-appearance: none;
}

.field-group select {
  cursor: pointer;
}

.field-group input:focus,
.field-group select:focus {
  border-color: var(--green);
}

.field-group label {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  font-weight: 500;
  color: var(--muted);
  pointer-events: none;
  transition: all 0.15s ease;
}

.field-group input:focus ~ label,
.field-group input:not(:placeholder-shown) ~ label,
.field-group select:focus ~ label,
.field-group.has-value label {
  top: 10px;
  transform: translateY(0);
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.field-group .select-arrow {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  font-size: 18px;
  color: var(--muted);
}

/* two-col row */
.fields-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* ========================
   CTA BUTTON
======================== */
.cta-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  background: var(--green);
  color: var(--white);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
  letter-spacing: 0.01em;
  margin-top: 24px;
}

.cta-btn:hover:not(:disabled) {
  background: var(--green-dark);
  transform: translateY(-1px);
}

.cta-btn:active:not(:disabled) {
  transform: translateY(0);
}

.cta-btn:disabled {
  background: #c0d9bc;
  cursor: not-allowed;
  transform: none;
}

.cta-sub {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  margin-top: 10px;
  font-weight: 500;
}

/* ========================
   LEGAL TEXT
======================== */
.legal {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.legal p {
  font-size: 10.5px;
  line-height: 1.6;
  color: #9ca3af;
  font-weight: 400;
}

/* ========================
   PROCESSING OVERLAY
======================== */
.processing-overlay {
  position: fixed;
  inset: 0;
  background: var(--white);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 28px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.processing-overlay.visible {
  opacity: 1;
  pointer-events: all;
}

/* Triple ring spinner */
.spinner-wrap {
  position: relative;
  width: 80px;
  height: 80px;
}

.ring {
  position: absolute;
  border-radius: 50%;
  border: 3px solid transparent;
}

.ring-1 {
  inset: 0;
  border-top-color: #4a9c3f;
  animation: spin 1.1s linear infinite;
}

.ring-2 {
  inset: 14px;
  border-right-color: #86c97e;
  animation: spin 1.7s linear infinite reverse;
  opacity: 0.75;
}

.ring-3 {
  inset: 28px;
  border-bottom-color: #4a9c3f;
  animation: spin 0.85s linear infinite;
  opacity: 0.5;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.processing-msg {
  font-size: 15px;
  font-weight: 600;
  color: var(--dark);
  text-align: center;
  min-height: 24px;
  letter-spacing: -0.01em;
}

.processing-done {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.done-check {
  font-size: 52px !important;
  color: var(--green);
}

.done-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.02em;
}

.done-sub {
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
}

/* ========================
   REDUCED MOTION
======================== */
@media (prefers-reduced-motion: reduce) {
  .step-exit, .step-enter { animation: none; }
  .ring-1, .ring-2, .ring-3 { animation-duration: 0.01ms; }
}

/* ========================
   MOBILE BLURB
======================== */
.mobile-blurb {
  font-size: 13px;
  line-height: 1.6;
  color: #6b7280;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid #e5e7eb;
}
@media (min-width: 640px) {
  .mobile-blurb { display: none; }
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── US States ─────────────────────────────────────── */
const STATES = [
  'Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut',
  'Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa',
  'Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan',
  'Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada',
  'New Hampshire','New Jersey','New Mexico','New York','North Carolina',
  'North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island',
  'South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont',
  'Virginia','Washington','West Virginia','Wisconsin','Wyoming'
];

const SLIDER_MIN = 100;
const SLIDER_MAX = 2000;

function fillPct(val) {
  return ((val - SLIDER_MIN) / (SLIDER_MAX - SLIDER_MIN) * 100).toFixed(2);
}

function formatDollars(val) {
  return val >= 1000 ? `$${(val/1000).toFixed(val % 1000 === 0 ? 0 : 1)}k` : `$${val}`;
}

/* ── Left Panel ─────────────────────────────────────── */
function LeftPanel() {
  return (
    <div className="panel-left">
      <img src="../media/logo.svg" alt="Logo" className="left-logo" />

      {/* Desktop verbose */}
      <div className="left-verbose">
        <div className="left-eyebrow">Early Wage Access</div>
        <div className="left-headline">
          Don't wait for payday, when you can get paid <span className="accent">today!</span>
        </div>
        <div className="left-rule" />
        <ul className="left-bullets">
          <li>Access up to $2,000 instantly</li>
          <li>Funds in your account today</li>
          <li>No waiting for payday</li>
          <li>Zero interest, zero fees</li>
        </ul>
        <p className="left-blurb">
          Early Wage Access, or EWA, lets employees access a portion of the wages they've already earned before their scheduled payday. It can provide added flexibility for covering everyday expenses, bills, or unexpected costs without waiting for the next paycheck.
        </p>
      </div>

      {/* Mobile compact */}
      <div className="left-compact">
        <div className="left-eyebrow">Early Wage Access</div>
        <div className="compact-headline">
          Don't wait for payday, when you can get paid <span className="accent">today!</span>
        </div>
        <ul className="compact-bullets">
          <li>Access up to $2,000 instantly</li>
          <li>Funds in your account today</li>
          <li>No waiting for payday</li>
          <li>Zero interest, zero fees</li>
        </ul>
      </div>

      <div className="left-ssl">
        <span className="material-icons-outlined">lock</span>
        256-bit SSL encrypted · Never sold
      </div>
    </div>
  );
}

/* ── Step 1: Amount Slider ──────────────────────────── */
function StepAmount({ onNext, animClass }) {
  const [amount, setAmount] = useState(500);
  const sliderRef = useRef(null);

  const pct = fillPct(amount);

  function updateSlider(val) {
    const p = fillPct(val);
    if (sliderRef.current) {
      sliderRef.current.style.background =
        `linear-gradient(to right, #4a9c3f ${p}%, #d4ead1 ${p}%)`;
    }
  }

  useEffect(() => { updateSlider(amount); }, [amount]);

  const handleChange = (e) => {
    const v = Number(e.target.value);
    setAmount(v);
  };

  const PRESETS = [100, 500, 1000, 2000];

  return (
    <div className={`step ${animClass}`}>
      <div className="step-eyebrow">Early Wage Access</div>
      <div className="step-headline">How much do you need?</div>
      <p className="step-sub">Drag to choose your amount</p>

      <div className="amount-display">
        <div className="amount-value">${amount.toLocaleString()}</div>
        <div className="amount-label">selected amount</div>
      </div>

      <div className="slider-wrap">
        <input
          ref={sliderRef}
          type="range"
          min={SLIDER_MIN}
          max={SLIDER_MAX}
          step={50}
          value={amount}
          onChange={handleChange}
        />
        <div className="slider-minmax">
          <span>$100</span>
          <span>$2,000</span>
        </div>
      </div>

      <div className="presets-row">
        {PRESETS.map(p => (
          <button
            key={p}
            className={`preset-btn${amount === p ? ' active' : ''}`}
            onClick={() => setAmount(p)}
          >
            {p >= 1000 ? `$${p/1000}k` : `$${p}`}
          </button>
        ))}
      </div>

      <button className="cta-btn" onClick={() => onNext(amount)}>
        Continue →
      </button>
      <p className="cta-sub">Not a loan. Accessing wages already earned.</p>
    </div>
  );
}

/* ── Step 2: Personal Info ──────────────────────────── */
function StepInfo({ amount, onNext, animClass }) {
  const [form, setForm] = useState({
    firstName: 'Jason',
    lastName: 'Williams',
    email: 'jason@epcvip.com',
    age: '',
    state: '',
  });

  const update = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

  const valid =
    form.firstName.trim().length >= 2 &&
    form.lastName.trim().length >= 2 &&
    /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email) &&
    Number(form.age) >= 18 && Number(form.age) <= 80 &&
    form.state !== '';

  /* Floating label needs has-value class on select */
  function selectClass(val) {
    return `field-group${val ? ' has-value' : ''}`;
  }

  return (
    <div className={`step ${animClass}`}>
      <div className="step-eyebrow">Almost there</div>
      <div className="step-headline">Tell us about yourself</div>
      <p className="step-sub">We match you to the best EWA options</p>

      <div className="fields-stack">
        <div className="fields-row">
          <div className="field-group">
            <input
              id="v3-firstName"
              type="text"
              value={form.firstName}
              onChange={update('firstName')}
              placeholder=" "
              autoComplete="given-name"
            />
            <label htmlFor="v3-firstName">First name</label>
          </div>
          <div className="field-group">
            <input
              id="v3-lastName"
              type="text"
              value={form.lastName}
              onChange={update('lastName')}
              placeholder=" "
              autoComplete="family-name"
            />
            <label htmlFor="v3-lastName">Last name</label>
          </div>
        </div>

        <div className="field-group">
          <input
            id="v3-email"
            type="email"
            value={form.email}
            onChange={update('email')}
            placeholder=" "
            autoComplete="email"
          />
          <label htmlFor="v3-email">Email address</label>
        </div>

        <div className="fields-row">
          <div className="field-group">
            <input
              id="v3-age"
              type="number"
              value={form.age}
              onChange={update('age')}
              placeholder=" "
              min={18}
              max={80}
              autoComplete="off"
            />
            <label htmlFor="v3-age">Age</label>
          </div>

          <div className={selectClass(form.state)}>
            <select id="v3-state" value={form.state} onChange={update('state')}>
              <option value="" disabled></option>
              {STATES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <label htmlFor="v3-state">State</label>
            <span className="material-icons-outlined select-arrow">expand_more</span>
          </div>
        </div>
      </div>

      <button
        className="cta-btn"
        disabled={!valid}
        onClick={() => onNext(form)}
      >
        Continue →
      </button>

      <div className="legal">
        <p>
          By clicking Continue, you agree to our Terms of Service and Privacy Policy,
          and consent to receive marketing communications. You authorize us to share
          your information with our network of EWA providers on your behalf.
        </p>
        <p>
          This is not a loan application. EWA advances are not subject to interest charges
          or fees. Advances are limited to wages already earned. Eligibility is determined
          by your employer's EWA program participation. Not available in all states.
        </p>
      </div>
    </div>
  );
}

/* ── Processing Overlay ─────────────────────────────── */
const MESSAGES = [
  'Verifying your information…',
  'Matching EWA providers…',
  'Almost there…',
];

function ProcessingOverlay({ visible }) {
  const [msgIdx, setMsgIdx] = useState(0);
  const [done, setDone] = useState(false);

  useEffect(() => {
    if (!visible) {
      setMsgIdx(0);
      setDone(false);
      return;
    }

    let idx = 0;
    const interval = setInterval(() => {
      idx++;
      if (idx < MESSAGES.length) {
        setMsgIdx(idx);
      } else {
        clearInterval(interval);
      }
    }, 1100);

    const doneTimer = setTimeout(() => {
      setDone(true);
    }, 3500);

    return () => {
      clearInterval(interval);
      clearTimeout(doneTimer);
    };
  }, [visible]);

  return (
    <div className={`processing-overlay${visible ? ' visible' : ''}`} role="status" aria-live="polite">
      {!done ? (
        <>
          <div className="spinner-wrap" aria-hidden="true">
            <div className="ring ring-1" />
            <div className="ring ring-2" />
            <div className="ring ring-3" />
          </div>
          <div className="processing-msg">{MESSAGES[msgIdx]}</div>
        </>
      ) : (
        <div className="processing-done">
          <span className="material-icons-outlined done-check">check_circle</span>
          <div className="done-title">User Redirected</div>
          <div className="done-sub">You're being connected to your EWA options.</div>
        </div>
      )}
    </div>
  );
}

/* ── App Root ───────────────────────────────────────── */
function App() {
  const [step, setStep] = useState(1); // 1 or 2
  const [animClass, setAnimClass] = useState('');
  const [processing, setProcessing] = useState(false);
  const [amount, setAmount] = useState(500);

  function transition(nextStep) {
    /* Add exit class */
    setAnimClass('step-exit');
    setTimeout(() => {
      setStep(nextStep);
      setAnimClass('step-enter');
    }, 280);
  }

  function handleStep1Next(selectedAmount) {
    setAmount(selectedAmount);
    transition(2);
  }

  function handleStep2Next(formData) {
    setProcessing(true);
  }

  return (
    <div className="split-wrap">
      <LeftPanel />

      <div className="panel-right">
        <div className="right-inner">
          {step === 1 && (
            <StepAmount
              onNext={handleStep1Next}
              animClass={animClass}
            />
          )}
          {step === 2 && (
            <StepInfo
              amount={amount}
              onNext={handleStep2Next}
              animClass={animClass}
            />
          )}
          <div className="mobile-blurb">
            Early Wage Access, or EWA, lets employees access a portion of the wages they've already earned before their scheduled payday. It can provide added flexibility for covering everyday expenses, bills, or unexpected costs without waiting for the next paycheck.
          </div>
        </div>
      </div>

      <ProcessingOverlay visible={processing} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
