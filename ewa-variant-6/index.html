<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EWA — Early Wage Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }
body {
  height: 100%;
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #f0ede6;
}
#root { height: 100%; }

/* ─── Layout ─── */
.shell {
  display: flex;
  min-height: 100vh;
}

/* LEFT PANEL */
.left-panel {
  flex: 0 0 42%;
  background: #f0ede6;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 60px 48px 40px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
}

.left-logo {
  margin-bottom: 48px;
}
.left-logo img {
  height: 32px;
  width: auto;
  display: block;
}

.left-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #4a9c3f;
  margin-bottom: 5px;
}

.left-headline {
  font-size: clamp(32px, 3vw, 44px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: #1a1a2e;
  margin-bottom: 24px;
}
.left-headline .green {
  color: #4a9c3f;
}

.green-rule {
  width: 48px;
  height: 3px;
  background: #4a9c3f;
  border-radius: 2px;
  margin-bottom: 15px;
}

.bullets {
  list-style: none;
  margin-bottom: 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.bullets li {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  font-size: 14px;
  font-weight: 500;
  color: #1a1a2e;
  line-height: 1.5;
}
.bullet-dot {
  flex-shrink: 0;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4a9c3f;
  margin-top: 7px;
}

.left-blurb {
  font-size: 13px;
  line-height: 1.7;
  color: #6b7280;
  margin-bottom: 32px;
  padding: 16px 20px;
  background: rgba(74,156,63,0.05);
  border-left: 3px solid rgba(74,156,63,0.4);
  border-radius: 0 8px 8px 0;
}

.ssl-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #6b7280;
  font-weight: 500;
}
.ssl-badge .material-icons-outlined {
  font-size: 16px;
  color: #4a9c3f;
}

/* RIGHT PANEL */
.right-panel {
  flex: 1;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
}

.right-inner {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  padding: 60px 40px 60px;
}

/* ─── Progress indicator ─── */
.step-indicator {
  margin-bottom: 36px;
}
.step-indicator-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.step-label {
  font-size: 12px;
  font-weight: 600;
  color: #6b7280;
  letter-spacing: 0.02em;
}
.step-pct {
  font-size: 12px;
  font-weight: 700;
  color: #4a9c3f;
}
.progress-track {
  width: 100%;
  height: 4px;
  background: #e5e7eb;
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #4a9c3f;
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ─── Step content animation ─── */
@keyframes contentFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.step-content {
  animation: contentFadeIn 0.35s ease both;
}

/* ─── Form headings ─── */
.form-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #4a9c3f;
  margin-bottom: 10px;
}
.form-headline {
  font-size: 26px;
  font-weight: 800;
  color: #1a1a2e;
  margin-bottom: 6px;
  line-height: 1.2;
}
.form-subtext {
  font-size: 14px;
  color: #6b7280;
  font-weight: 400;
  margin-bottom: 28px;
  line-height: 1.5;
}

/* ─── Amount select ─── */
.select-wrapper {
  position: relative;
  margin-bottom: 16px;
}
.amount-select {
  width: 100%;
  padding: 20px 48px 20px 20px;
  font-size: 22px;
  font-weight: 700;
  color: #1a1a2e;
  background: white;
  border: 2px solid #d4ead1;
  border-radius: 12px;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.amount-select:focus {
  border-color: #4a9c3f;
  box-shadow: 0 0 0 3px rgba(74,156,63,0.12);
}
.amount-select.selected {
  border-color: #4a9c3f;
}
.select-arrow {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 22px;
  color: #4a9c3f;
  pointer-events: none;
  line-height: 1;
  font-style: normal;
}

/* ─── Confirmation card ─── */
.confirm-card {
  background: rgba(74,156,63,0.06);
  border: 1px solid rgba(74,156,63,0.25);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 28px;
}
.confirm-card .material-icons-outlined {
  font-size: 22px;
  color: #4a9c3f;
  flex-shrink: 0;
  margin-top: 1px;
}
.confirm-card-text {}
.confirm-amount {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 2px;
}
.confirm-sub {
  font-size: 13px;
  color: #6b7280;
  font-weight: 400;
}

/* ─── Floating label fields ─── */
.field-group {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 24px;
}
.field-row {
  display: flex;
  gap: 14px;
}
.field-row .float-field {
  flex: 1;
}

.float-field {
  position: relative;
}
.float-field input,
.float-field select {
  width: 100%;
  padding: 22px 16px 8px;
  font-size: 15px;
  font-weight: 600;
  color: #1a1a2e;
  background: white;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  font-family: 'Montserrat', sans-serif;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.float-field input:focus,
.float-field select:focus {
  border-color: #4a9c3f;
  box-shadow: 0 0 0 3px rgba(74,156,63,0.10);
}
.float-field input.valid,
.float-field select.valid {
  border-color: #d4ead1;
}
.float-field label {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  font-weight: 500;
  color: #9ca3af;
  pointer-events: none;
  transition: all 0.18s ease;
  font-family: 'Montserrat', sans-serif;
  background: white;
}
.float-field input:focus + label,
.float-field input:not(:placeholder-shown) + label,
.float-field select:focus + label,
.float-field select.has-value + label {
  top: 10px;
  transform: translateY(0);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #4a9c3f;
}
.float-field input { padding-top: 22px; padding-bottom: 8px; }
.float-field select { padding-top: 22px; padding-bottom: 8px; cursor: pointer; }

/* Select arrow for float fields */
.float-field.has-arrow::after {
  content: '▾';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #6b7280;
  pointer-events: none;
  font-size: 14px;
}

/* ─── CTA Button ─── */
.cta-btn {
  width: 100%;
  padding: 18px 24px;
  background: #4a9c3f;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Montserrat', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
  letter-spacing: 0.01em;
  margin-bottom: 20px;
}
.cta-btn:hover:not(:disabled) {
  background: #3a7a30;
  box-shadow: 0 4px 16px rgba(74,156,63,0.30);
}
.cta-btn:active:not(:disabled) {
  transform: scale(0.99);
}
.cta-btn:disabled {
  background: #d1d5db;
  color: #9ca3af;
  cursor: not-allowed;
}

/* ─── Legal note ─── */
.legal-note {
  font-size: 11px;
  line-height: 1.6;
  color: #9ca3af;
  text-align: center;
  margin-top: 8px;
}
.legal-note + .legal-note {
  margin-top: 10px;
}

/* ─── Processing overlay ─── */
.processing-overlay {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

.spinner-wrap {
  position: relative;
  width: 100px;
  height: 100px;
  margin-bottom: 36px;
}
.ring {
  position: absolute;
  border-radius: 50%;
  border: 4px solid transparent;
}
.ring-1 {
  inset: 0;
  border-top-color: #4a9c3f;
  animation: spin 1.1s linear infinite;
}
.ring-2 {
  inset: 14px;
  border-right-color: #86c97e;
  animation: spin 1.7s linear infinite reverse;
  opacity: 0.75;
}
.ring-3 {
  inset: 28px;
  border-bottom-color: #4a9c3f;
  animation: spin 0.85s linear infinite;
  opacity: 0.5;
}
@keyframes spin { to { transform: rotate(360deg); } }

.processing-msg {
  font-size: 16px;
  font-weight: 600;
  color: #1a1a2e;
  margin-bottom: 8px;
  text-align: center;
  min-height: 24px;
  transition: opacity 0.3s ease;
}

.redirect-check {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  animation: contentFadeIn 0.4s ease both;
}
.redirect-check .material-icons-outlined {
  font-size: 56px;
  color: #4a9c3f;
}
.redirect-title {
  font-size: 22px;
  font-weight: 800;
  color: #1a1a2e;
}
.redirect-sub {
  font-size: 14px;
  color: #6b7280;
  font-weight: 500;
}

/* ─── Mobile ─── */
@media (max-width: 639px) {
  .shell {
    flex-direction: column;
    min-height: auto;
  }
  .left-panel {
    position: static;
    height: auto;
    flex: none;
    padding: 28px 24px 24px;
  }
  .left-logo { margin-bottom: 24px; }
  .left-content { justify-content: flex-start; } /* mobile: no spare height, so centering is a no-op anyway */
  .left-headline { font-size: 30px; margin-bottom: 16px; letter-spacing: -1px; }
  .left-blurb { display: none; }
  .bullets { gap: 6px; margin-bottom: 20px; }
  .bullets li { font-size: 13px; }
  .bullets li:nth-child(n+3) { display: none; }
  .right-panel { flex: 1; min-height: 100%; }
  .right-inner { padding: 32px 20px 48px; }
  .form-headline { font-size: 22px; }
  .field-row { flex-direction: column; gap: 16px; }
}

@media (prefers-reduced-motion: reduce) {
  .step-content { animation: none; }
  .ring-1, .ring-2, .ring-3 { animation-duration: 3s; }
  .progress-fill { transition: none; }
}

.mobile-blurb {
  font-size: 13px;
  line-height: 1.6;
  color: #6b7280;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid #e5e7eb;
}
@media (min-width: 640px) {
  .mobile-blurb { display: none; }
}

/* ── Select: always raise label (placeholder-shown trick doesn't work on select) ── */
.float-field.has-arrow label {
  top: 8px !important;
  transform: none !important;
  font-size: 10px !important;
  font-weight: 700 !important;
  color: #4a9c3f !important;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.float-field.has-arrow select {
  padding-top: 22px !important;
  padding-bottom: 6px !important;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const AMOUNTS = [
  { label: '$100',   value: 100 },
  { label: '$250',   value: 250 },
  { label: '$500',   value: 500 },
  { label: '$750',   value: 750 },
  { label: '$1,000', value: 1000 },
  { label: '$1,500', value: 1500 },
  { label: '$2,000', value: 2000 },
];

const US_STATES = [
  'Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut',
  'Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa',
  'Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan',
  'Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire',
  'New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio',
  'Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota',
  'Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia',
  'Wisconsin','Wyoming'
];

/* ─── Left Panel ─── */
function LeftPanel() {
  return (
    <div className="left-panel">
      <div className="left-logo">
        <img src="../media/logo.svg" alt="EWA" />
      </div>
      <div className="left-content">
        <p className="eyebrow">Early Wage Access</p>
        <h1 className="left-headline">
          No loans. No interest.<br /><span className="green">Just your pay.</span>
        </h1>
        <div className="green-rule" />
        <ul className="bullets">
          <li><span className="bullet-dot" />Access wages you've already earned</li>
          <li><span className="bullet-dot" />No credit check, no debt</li>
          <li><span className="bullet-dot" />Automatic repayment on payday</li>
          <li><span className="bullet-dot" />Trusted by millions of workers</li>
        </ul>
        <p className="left-blurb">
          Early Wage Access, or EWA, lets employees access a portion of the wages they've already earned before their scheduled payday. It can provide added flexibility for covering everyday expenses, bills, or unexpected costs without waiting for the next paycheck.
        </p>
      </div>
      <div className="ssl-badge">
        <span className="material-icons-outlined">lock</span>
        256-bit SSL encrypted · Never sold
      </div>
    </div>
  );
}

/* ─── Step Progress ─── */
function StepProgress({ step }) {
  const pct = step === 1 ? 50 : 100;
  return (
    <div className="step-indicator">
      <div className="step-indicator-top">
        <span className="step-label">Step {step} of 2</span>
        <span className="step-pct">{pct}%</span>
      </div>
      <div className="progress-track">
        <div className="progress-fill" style={{ width: `${pct}%` }} />
      </div>
    </div>
  );
}

/* ─── Step 1: Amount Selection ─── */
function Step1({ onNext }) {
  const [amount, setAmount] = useState('');

  const selected = AMOUNTS.find(a => a.value === Number(amount));

  return (
    <div className="step-content" key="step1">
      <p className="form-eyebrow">Early Wage Access</p>
      <h2 className="form-headline">How much do you need?</h2>
      <p className="form-subtext">Choose your amount from the list below.</p>

      <div className="select-wrapper">
        <select
          className={`amount-select${amount ? ' selected' : ''}`}
          value={amount}
          onChange={e => setAmount(e.target.value)}
        >
          <option value="" disabled>Select your amount...</option>
          {AMOUNTS.map(a => (
            <option key={a.value} value={a.value}>{a.label}</option>
          ))}
        </select>
        <span className="select-arrow" aria-hidden="true">▾</span>
      </div>

      {selected && (
        <div className="confirm-card">
          <span className="material-icons-outlined">check_circle</span>
          <div className="confirm-card-text">
            <div className="confirm-amount">You selected {selected.label}</div>
            <div className="confirm-sub">A great start — let's find your options.</div>
          </div>
        </div>
      )}

      {!selected && <div style={{ marginBottom: 28 }} />}

      <button
        className="cta-btn"
        disabled={!amount}
        onClick={() => amount && onNext(Number(amount))}
      >
        Continue <span className="material-icons-outlined" style={{ fontSize: 20 }}>arrow_forward</span>
      </button>

      <p className="legal-note">
        By continuing, you agree to receive communications from participating EWA providers.
        This is not a loan application. No credit check required.
      </p>
    </div>
  );
}

/* ─── Floating Label Field ─── */
function FloatInput({ label, id, type = 'text', value, onChange, ...rest }) {
  return (
    <div className="float-field">
      <input
        id={id}
        type={type}
        value={value}
        onChange={onChange}
        placeholder=" "
        className={value ? 'valid' : ''}
        {...rest}
      />
      <label htmlFor={id}>{label}</label>
    </div>
  );
}

function FloatSelect({ label, id, value, onChange, options, placeholder }) {
  return (
    <div className="float-field has-arrow">
      <select
        id={id}
        value={value}
        onChange={onChange}
        className={value ? 'has-value valid' : ''}
      >
        <option value="">{placeholder || 'Select...'}</option>
        {options.map(opt => (
          <option key={opt} value={opt}>{opt}</option>
        ))}
      </select>
      <label htmlFor={id}>{label}</label>
    </div>
  );
}

/* ─── Step 2: Personal Info ─── */
function Step2({ onSubmit }) {
  const [form, setForm] = useState({
    firstName: 'Jason',
    lastName: 'Williams',
    email: 'jason@epcvip.com',
    age: '',
    state: '',
  });

  const set = field => e => setForm(f => ({ ...f, [field]: e.target.value }));

  const valid =
    form.firstName.trim() &&
    form.lastName.trim() &&
    /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email) &&
    Number(form.age) >= 18 &&
    Number(form.age) <= 80 &&
    form.state;

  return (
    <div className="step-content" key="step2">
      <p className="form-eyebrow">Almost there</p>
      <h2 className="form-headline">Your information</h2>
      <p className="form-subtext">We use this to match you with EWA providers.</p>

      <div className="field-group">
        <div className="field-row">
          <FloatInput id="v6-firstName" label="First Name" value={form.firstName} onChange={set('firstName')} />
          <FloatInput id="v6-lastName" label="Last Name" value={form.lastName} onChange={set('lastName')} />
        </div>
        <FloatInput id="v6-email" label="Email Address" type="email" value={form.email} onChange={set('email')} />
        <div className="field-row">
          <FloatInput
            id="v6-age"
            label="Age"
            type="number"
            value={form.age}
            onChange={set('age')}
            min={18}
            max={80}
          />
          <FloatSelect
            id="v6-state"
            label="State"
            value={form.state}
            onChange={set('state')}
            options={US_STATES}
            placeholder="Select..."
          />
        </div>
      </div>

      <button
        className="cta-btn"
        disabled={!valid}
        onClick={() => valid && onSubmit(form)}
      >
        Continue <span className="material-icons-outlined" style={{ fontSize: 20 }}>arrow_forward</span>
      </button>

      <p className="legal-note">
        By submitting this form, you consent to be contacted by one or more EWA providers
        regarding your request. Your information will be shared with participating lenders
        and service providers. Standard message and data rates may apply.
      </p>
      <p className="legal-note">
        EWA is not a loan. No interest is charged. Repayment is made automatically from
        your next paycheck. Subject to employer and provider eligibility requirements.
      </p>
    </div>
  );
}

/* ─── Processing Overlay ─── */
const MESSAGES = [
  'Verifying your information…',
  'Matching EWA providers…',
  'Almost there…',
];

function Processing() {
  const [msgIdx, setMsgIdx] = useState(0);
  const [done, setDone] = useState(false);

  useEffect(() => {
    const t1 = setTimeout(() => setMsgIdx(1), 1000);
    const t2 = setTimeout(() => setMsgIdx(2), 2200);
    const t3 = setTimeout(() => setDone(true), 3500);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, []);

  return (
    <div className="processing-overlay" role="status" aria-live="polite">
      {!done ? (
        <>
          <div className="spinner-wrap">
            <div className="ring ring-1" />
            <div className="ring ring-2" />
            <div className="ring ring-3" />
          </div>
          <p className="processing-msg">{MESSAGES[msgIdx]}</p>
        </>
      ) : (
        <div className="redirect-check">
          <span className="material-icons-outlined">check_circle</span>
          <p className="redirect-title">User Redirected</p>
          <p className="redirect-sub">You're being connected to your EWA options.</p>
        </div>
      )}
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [step, setStep] = useState(1);
  const [amount, setAmount] = useState(null);
  const [processing, setProcessing] = useState(false);

  function handleAmountNext(val) {
    setAmount(val);
    setStep(2);
  }

  function handleSubmit() {
    setProcessing(true);
  }

  return (
    <>
      {processing && <Processing />}
      <div className="shell">
        <LeftPanel />
        <div className="right-panel">
          <div className="right-inner">
            <StepProgress step={step} />
            {step === 1 && <Step1 onNext={handleAmountNext} />}
            {step === 2 && <Step2 onSubmit={handleSubmit} />}
            <div className="mobile-blurb">
              Early Wage Access, or EWA, lets employees access a portion of the wages they've already earned before their scheduled payday. It can provide added flexibility for covering everyday expenses, bills, or unexpected costs without waiting for the next paycheck.
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
